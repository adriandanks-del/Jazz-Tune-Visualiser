function analyzeTheoryProfile(chords, useFlats, keyHint = null) {
  const analyzed = chords.map((ch, index) => ({
    ...ch,
    index,
    rootIdx: NOTE_TO_INDEX[ch.root],
    family: chordFamily(ch.quality),
    label: chordDisplayLabel(ch, useFlats)
  }));

  const candidates = [];
  for (let tonic = 0; tonic < 12; tonic++) {
    KEY_DETECTION_MODES.forEach(mode => {
      candidates.push(evaluateKeyCandidate(analyzed, tonic, mode));
    });
  }

  candidates.sort((a, b) => scoreKeyCandidateWithHint(b, keyHint) - scoreKeyCandidateWithHint(a, keyHint));
  const best = candidates[0];
  const alternates = candidates.filter(candidate => candidate !== best).slice(0, 2);
  const tonicLabel = displayNote(best.tonic, useFlats);
  const roadmapFindings = analyzeJazzRoadmap(chords, useFlats);
  const enrichedRoadmapFindings = enrichFindingsWithContext(roadmapFindings, analyzed, useFlats);
  const calmScaleOverrides = detectCalmScaleOverrides(chords);
  const isCadenceTonicFamily = (family) => family === 'major' || family === 'minor';
  const cadenceForwardAnchors = [];
  for (let i = 0; i < analyzed.length - 2; i++) {
    const a = analyzed[i];
    const b = analyzed[i + 1];
    const c = analyzed[i + 2];
    const isIIVI = (a.family === 'minor' || a.family === 'half-diminished')
      && b.family === 'dominant'
      && c.family === 'major'
      && pc(a.rootIdx - c.rootIdx) === 2
      && pc(b.rootIdx - c.rootIdx) === 7;
    const isIIVi = (a.family === 'minor' || a.family === 'half-diminished')
      && b.family === 'dominant'
      && c.family === 'minor'
      && pc(a.rootIdx - c.rootIdx) === 2
      && pc(b.rootIdx - c.rootIdx) === 7;
    if (!isIIVI && !isIIVi) continue;
    if (!isCadenceTonicFamily(c.family)) continue;
    // Back-extend anchor for long-turnaround lead-in: V/vi -> vi -> ii -> V -> I.
    // Example: A7(b9) -> Dm7 -> Gm7 -> C7 -> FMaj7.
    let spanStart = i;
    const preVi = analyzed[i - 1];
    const preVofVi = analyzed[i - 2];
    const hasViLeadIn = !!(
      c.family === 'major'
      && preVi
      && preVofVi
      && preVi.family === 'minor'
      && preVofVi.family === 'dominant'
      && pc(a.rootIdx - preVi.rootIdx) === 5
      && pc(preVi.rootIdx - preVofVi.rootIdx) === 5
    );
    if (hasViLeadIn) {
      spanStart = i - 2;
    }
    cadenceForwardAnchors.push({
      spanStart,
      tonicIndex: i + 2,
      tonic: c.rootIdx,
      mode: c.family === 'minor' ? 'minor' : 'major'
    });
  }
  const localCadenceKeyByIndex = new Array(analyzed.length).fill(null);
  const isDiatonicInAnchorKey = (chord, anchor) => {
    if (!chord || !anchor) return false;
    const degree = pc(chord.rootIdx - anchor.tonic);
    const scale = anchor.mode === 'major' ? MAJOR_SCALE : MINOR_SCALE;
    if (!scale.includes(degree)) return false;
    const expectedFamilies = anchor.mode === 'major'
      ? MAJOR_EXPECTED_FAMILIES[degree]
      : MINOR_EXPECTED_FAMILIES[degree];
    return !Array.isArray(expectedFamilies) || expectedFamilies.includes(chord.family);
  };
  cadenceForwardAnchors.forEach((anchor) => {
    // 4-chord phrase context: ii-V-I plus immediate continuation (often IV or vi).
    const blockStart = anchor.spanStart;
    const blockEnd = Math.min(analyzed.length - 1, anchor.tonicIndex + 1);
    for (let idx = blockStart; idx <= blockEnd; idx++) {
      const inCadenceCore = idx <= anchor.tonicIndex;
      if (inCadenceCore || isDiatonicInAnchorKey(analyzed[idx], anchor)) {
        const existing = localCadenceKeyByIndex[idx];
        // When local cadence windows overlap, use the most recent cadence tonic.
        if (!existing || anchor.tonicIndex >= existing.tonicIndex) {
          localCadenceKeyByIndex[idx] = anchor;
        }
      }
    }
  });
  for (let idx = 1; idx < analyzed.length; idx++) {
    const prev = analyzed[idx - 1];
    const curr = analyzed[idx];
    if (!prev || !curr) continue;
    if (curr.family !== 'major' || prev.family !== 'major') continue;
    // Explicitly preserve common major I->IV continuation context (e.g., AbMaj7 -> DbMaj7).
    if (pc(curr.rootIdx - prev.rootIdx) !== 5) continue;
    if (!localCadenceKeyByIndex[idx]) {
      localCadenceKeyByIndex[idx] = {
        spanStart: idx - 1,
        tonicIndex: idx - 1,
        tonic: prev.rootIdx,
        mode: 'major'
      };
    }
  }
  const sectionalAnalysis = analyzeSectionalKeys(analyzed, enrichedRoadmapFindings, useFlats);
  const parseBarRange = (barRangeText) => {
    const m = /^bars\s+(\d+)-(\d+)$/i.exec(String(barRangeText || '').trim());
    if (!m) return null;
    const start = Number.parseInt(m[1], 10);
    const end = Number.parseInt(m[2], 10);
    if (!Number.isFinite(start) || !Number.isFinite(end)) return null;
    return { start: Math.min(start, end), end: Math.max(start, end) };
  };
  const parseFindingSpan = (spanText) => {
    const m = /^(\d+)(?:-(\d+))?$/.exec(String(spanText || '').trim());
    if (!m) return null;
    const start = Number.parseInt(m[1], 10);
    const end = Number.parseInt(m[2] || m[1], 10);
    if (!Number.isFinite(start) || !Number.isFinite(end)) return null;
    return { start: Math.min(start, end), end: Math.max(start, end) };
  };
  const spansOverlap = (a, b) => a && b && a.start <= b.end && b.start <= a.end;
  const lowConfidenceRanges = (Array.isArray(sectionalAnalysis) ? sectionalAnalysis : [])
    .filter(section => section?.confidenceLabel === 'ambiguous' || section?.confidenceLabel === 'pattern-anchored')
    .map(section => parseBarRange(section?.barRange))
    .filter(Boolean);
  const lowConfidenceSensitiveTypes = new Set(['Direct Modulation', 'Prepared Modulation', 'Deceptive Cadence']);
  const tightenedRoadmapFindings = enrichedRoadmapFindings.filter(finding => {
    if (!lowConfidenceSensitiveTypes.has(finding?.type)) return true;
    const findingSpan = parseFindingSpan(finding?.span);
    if (!findingSpan) return true;
    const overlapsLowConfidence = lowConfidenceRanges.some(range => spansOverlap(findingSpan, range));
    return !overlapsLowConfidence;
  });
  const enrichedChordMap = best.chordMap.map((ch, index) => {
    const activeRoadmapFindings = tightenedRoadmapFindings.filter(finding => {
      const [startRaw, endRaw] = String(finding.span || '').split('-');
      const start = Number.parseInt(startRaw, 10) - 1;
      const end = Number.parseInt(endRaw ?? startRaw, 10) - 1;
      if (!Number.isFinite(start) || !Number.isFinite(end)) return false;
      return index >= start && index <= end;
    });
    const roadmapTypes = Array.from(new Set(activeRoadmapFindings.map(finding => finding.type)));
    const localKey = localCadenceKeyByIndex[index];
    const theoryChord = localKey
      ? {
          ...ch,
          degree: pc(ch.rootIdx - localKey.tonic),
          roman: formatFunctionalRomanNumeral(ch, analyzed[index + 1], localKey.tonic, localKey.mode),
          mode: localKey.mode,
          functionLabel: harmonicFunctionForChord(pc(ch.rootIdx - localKey.tonic), ch.family, localKey.mode),
          activeRoadmapFindings,
          roadmapTypes
        }
      : { ...ch, activeRoadmapFindings, roadmapTypes };
    const overrideScales = calmScaleOverrides.get(index);
    return { ...theoryChord, scales: overrideScales || scalesForFunction(theoryChord) };
  });
  const summary = enrichedChordMap.slice(0, 8).map(ch => `${ch.roman} ${ch.label}`).join(' | ');

  return {
    bestKeyLabel: `${tonicLabel} ${best.mode === 'major' ? 'major' : 'minor'}`,
    bestMode: best.mode,
    confidence: best.score,
    alternates: alternates.map(candidate => ({
      label: `${displayNote(candidate.tonic, useFlats)} ${candidate.mode === 'major' ? 'major' : 'minor'}`,
      score: candidate.score
    })),
    chordMap: enrichedChordMap,
    voiceLeading: buildVoiceLeading(enrichedChordMap, useFlats),
    summary,
    sections: sectionalAnalysis,
    roadmapFindings: tightenedRoadmapFindings
  };
}

const ROADMAP_EXPLANATIONS = {
  'ii-V-I':           { body: 'The most common cadence in jazz, often seen as iim7-V7-IMaj7.\n\n The ii chord sets up the V7 chord, which has an unsettled sound due the presence of a tritone interval between the 3rd and b7th. \n\nWhen it reaches the I chord, and the 3rd and 7th guide tones are resolved by a half or full step, the whole passage sounds like it has reached a destination.\n\nAs a tip: You could use ii = Dorian, V7 = Mixolydian or Altered (Half-Whole when V7b9), I = Major or Lydian.\n\n When the ii-V points at a new tonic, treat that destination as the new key and voice-lead 3rds and 7ths into the target chord.', isDynamic: true },

  'ii-V-i':           { body: 'Same cadence logic as ii-V-I, but resolving to a minor.\nNormally, the canonical form is iiø-V7-i (when ii is m7b5), for example: {iiViMinorCanonicalExample}.\nIn this song, the detected form is {iiViMinorDetectedType}: {iiViMinorExample}.\n{iiMinorScaleHint} V7alt = Altered (7th mode of jazz melodic minor). i = jazz melodic minor or Dorian depending on how dark/bright you want it.\nImportant: this can be a local tonicization inside the parent key, not necessarily a full key change. Only treat it as modulation when surrounding harmony confirms a new tonic area.', isDynamic: true },

  'Cadence Overrun':  { body: 'After landing on I (or i), the progression immediately moves to IV-style continuation. This is a common cadence extension rather than a fresh key change.', tip: 'Treat the cadence as complete, then pivot smoothly into IV language; keep guide tones connected between I and IV.' },

  'Cadence Dropback': { body: 'After a cadence lands, the harmony drops back to VI7 to restart forward motion toward ii. This is a classic turnaround continuation move.', tip: 'Hear VI7 as V7/ii. Outline its 3rd and b7th, then voice-lead into ii for a clean restart of the cadence chain.' },

  'Launcher':         { body: 'An approach cell (typically ii-V or iiø-V) at the end of a phrase that resolves at the start of the next phrase/section. It creates forward momentum across the boundary.', tip: 'Shape the ii-V as a question and resolve strongly on the new phrase downbeat. Aim your line so arrival feels intentional, not accidental.' },

  'Join: Same-Key':      { body: 'Two neighboring roadmap bricks stay in the same tonal area. The connection is stable and continuity-focused.', tip: 'Favor smooth guide-tone continuation and motif development rather than dramatic reharmonization.' },
  'Join: Step-Down':     { body: 'The next brick shifts down by a near-step relation, creating a controlled tonal descent.', tip: 'Use small voice-leading moves and emphasize common tones to keep the transition coherent.' },
  'Join: Step-Up':       { body: 'The next brick shifts up by a near-step relation, giving a gentle lift into the next harmonic area.', tip: 'Target the new brick\'s 3rd early to establish the lift immediately.' },
  'Join: Cycle-Forward': { body: 'The connection moves forward in cycle-of-fifths logic, a common jazz engine for momentum.', tip: 'Think one dominant pull ahead and keep 3rd-to-7th guide-tone lines continuous.' },
  'Join: Tritone-Jump':  { body: 'A tritone-distance connection between bricks. This is a stronger color jump and often needs clear melodic anchoring.', tip: 'Use compact motifs and strong chord-tone targets on arrival to stabilize the jump.' },

  'Sub-V ii-V-I':     { body: 'A regular ii followed by tritone-sub dominant (bII7 instead of V7), then tonic. For example: {subVExample}. The key sound is chromatic root motion with preserved dominant guide-tone pull.', tip: 'Play ii as usual, then switch to bII7 Lydian Dominant. If the sound wants more b9 or #9 tension, use bII Altered or Half-Whole for the dominant bar.', isDynamic: true },

  'I-vi-ii-V':        { body: 'The classic diatonic turnaround. Each chord sets up the next: I is home, vi is colouring, ii is the predominant, V pulls back to I. Found in almost every standard.', tip: 'Keep it diatonic (Major throughout) until the V7 where you can introduce Altered tensions.' },

  'I-VI-II':          { body: 'A dominant-heavy variant: I7, VI7, and II7 form a chromatic chain of dominant chords rather than diatonic or minor voicings — each chord acts as a secondary dominant toward the next target. Driving momentum. Example: {iviiExample}.', tip: 'Each dominant can take Altered scale — the resolution target becomes the next chord\'s root.', isDynamic: true },

  'Tonicization of IV':{ body: 'A V7/IV followed by the IV chord — briefly treating IV as a temporary tonic. Example: {tonicIVExample}. Very common in blues and gospel; gives the progression a "stop" feeling.', tip: 'Mixolydian or Lydian Dominant on the V7/IV, then Lydian on the IV major to keep the brightness.', isDynamic: true },

  'Turnaround':       { body: 'I-vi-ii-V: a four-chord loop that cycles back to the start of a tune. Example: {turnaroundExample}. The vi creates a detour, the ii-V restores dominant pull. This is a core standard-era sentence ending.', tip: 'The vi chord can be reharmonised to VI7 (secondary dominant) or tritone sub. On ii, Dorian is harmonically direct; the jazz melodic minor from ii adds a brighter major-7 colour if your line wants more forward pull.', isDynamic: true },

  'iii-VI-ii-V Turnaround': { body: 'A classic turnaround variant: iii -> VI7 -> ii -> V. Example in this span: {relatedIIsExample}. This is usually best heard as one functional 4-chord sentence (a circle-of-fifths chain) that leads toward tonic, not as unrelated fragments.', tip: 'Primary strategy: hear the whole arc (iii-VI7-ii-V). Secondary strategy: zoom into two local ii-V pairs (iii->VI7 and ii->V) for line practice. Over VI7, treat it as a secondary dominant pulling to ii.', isDynamic: true },

  'Long Turnaround':  { body: 'A five-chord cadence sentence: V7/vi -> vi7 -> ii7 -> V7 -> Imaj7. Example: {longTurnExample}. The opening applied dominant creates extra tension before the standard ii-V-I cadence lands at the tonic. In F major, A7(b9) -> Dm7 -> Gm7 -> C7 -> FMaj7 is a classic long-turnaround/circle-of-fifths unwind.', tip: 'Hear this as one continuous dominant-to-tonic arc. Treat the first chord as a true secondary dominant (often Altered or harmonic-minor derived), then simplify to diatonic ii-V-I language as you approach the final tonic.', isDynamic: true },

  'Gypsy Turnaround': { body: 'A swing/gypsy-flavoured tonic setup: I6 or IMaj7 moves to VI7, then into a following minor-to-dominant cell. Sometimes that last pair is the home-key ii-V; sometimes, simply the next ii-V in motion. ', tip: 'Hear the opening tonic as colour, then track the pull of the later ii-V cell. Arpeggiate each dominant cleanly and voice-lead by half-step into the next chord tone.' },

  'Rhythm Changes A': { body: 'From Gershwin\'s "I Got Rhythm". \n\nThe I-VI7-ii-V packs all dominant tension into two chords and is the basis of hundreds of bebop heads. The VI7 is the secondary dominant of ii (V7/ii), creating fierce forward motion. \n\n Similar to the turnaround, but that extra 7 on the VI chord (instead of vim7) gives it a bit more energy and harmonic pull.', tip: 'The VI7 is a secondary dominant of ii — try the Altered (7th Mode of Melodic Minor) scale on it for a bebop flavour.', isDynamic: true },

  'Rhythm Changes Bridge': { body: 'The famous bridge: {bridgeExample} — four dominants each resolving up a 4th in a chain. Pure dominant momentum.', tip: 'Each dominant resolves to the next \'tonic\' — use Mixolydian or Altered on each one.', isDynamic: true },

  'Gypsy Cadence':    { body: 'A minor tonic moving through dominant pull and back to minor (often with m6 colours). This is a hallmark motion in Gypsy Jazz and minor swing repertoire.', tip: 'On the dominant, target b9 and 3rd strongly; on the minor tonic, resolve to 6 or 9 for classic gypsy colour.' },
  
  'Extended ii-V-i': { body: 'The dominant V7 of the target minor key appears a full bar before the iiø chord, establishing the key area early. Pattern: {extIIViExample}. The first V7 names the destination, the iiø fills in tension, and the repeated V7 drives the final resolution.', tip: 'Treat all four bars as one extended minor dominant area: on both V7 bars try Altered or Half-Whole diminished; on the iiø use Locrian natural 2 for smooth voice-leading into the minor tonic.', isDynamic: true },

  'Cycling ii-V-i':  { body: 'Two back-to-back ii-V-i cadences where the second minor tonic sits a perfect 5th above the first, cycling through the circle of 5ths in minor. Example: {cycleExample}. Each cadence briefly tonicises a new minor centre before the progression moves on.', tip: 'Treat each ii-V-i as its own local key. Resolve clearly into the first minor tonic, then reset your ear and phrase shape for the next one.', isDynamic: true },

  'Related ii\'s':   { body: 'A bebop-era reharmonization where a series of m7 chords each precedes its relative V7 (the V7 a perfect 4th above each m7). \nExample: {relatedIIsExample}.\n Each V7 drives into the next m7: m7 → V7 → m7 → V7 → ... This creates an ascending staircase of dominant tension, eventually landing on a final tonic (I major or minor) or continuing indefinitely. \nThis device appears frequently in Charlie Parker, Dizzy Gillespie, and Thelonious Monk arrangements as a way to inject bebop sophistication and refresh harmonic colour mid-phrase while maintaining forward momentum.', tip: 'Each m7 is the relative ii of the next V7 — treat them as pairs. On each m7, use Dorian language; on each V7, layer Altered or Half-Whole Diminished for extra tension. The chains often land on a final tonic to resolve all the accumulated dominant pull. Great for extended single-note lines or chord-scale work over multiple bars.', isDynamic: true },

  'Cycle of ii-V Pairs': { body: 'A continuous chain of linked ii-V cells moving by cycle-of-fifths logic. Example in this span: {cycleIIPairsExample}. This is usually clearer as one global harmonic trajectory than as isolated local pairs.', tip: 'Primary strategy: hear the whole cycle and target each incoming minor chord from the previous dominant. Secondary strategy: practice each local ii-V pair in isolation, then reconnect them into one long phrase.', isDynamic: true },

  'Backdoor Dominant':{ body: 'The iv minor and bVII7 sneak in from the back door: {backdoorExample}. The bVII7 is a whole step below I, resolving upward instead of the usual down-a-4th. Smooth and bluesy.', tip: 'Use Lydian Dominant on the bVII7 — its #4 avoids clashing with the IV chord\'s natural 4th.', isDynamic: true },

  'Backdoor Cadence': { body: 'A single bVII7 moving up a whole step to I. Pattern: {backdoorExample}. Sub-dominant feel, no tritone pull. Very common in soul, gospel, and modal jazz.', tip: 'Lydian Dominant scale fits perfectly here — it has a raised 4th which avoids the avoid note clash.', isDynamic: true },

  'Backdoor Setup':   { body: 'A two-bar setup into the backdoor cadence: {backdoorExample}. The minor iv prepares the bVII7, giving extra momentum before the upward resolution.', tip: 'Treat the whole progression as one sub-dominant area — minor pentatonic from the iv root works across both chords.', isDynamic: true },

  'Tritone Sub':      { body: 'The V7 is replaced by a dominant 7th chord a tritone (a b5th, or 6 semitones) away. Example: {tritoneSub2Example}. As both dominants share the same guide-tone tritone (3rd and b7), the function stays while the bass motion becomes chromatic.', tip: 'Using The Night In Tunisia example instead A7 there\'s an Eb7. Scale options on sub-V are Eb Lydian Dominant or Eb Altered for more tension. To confuse matters, if you use the  altered scale for the A7, you are using the same notes as the Eb7 Lydian Dominant scale. Voice-lead the 3rd and b7 into tonic chord tones.', isDynamic: true },

 

  'Secondary Dominant':{ body: 'A dominant 7th that targets a diatonic chord other than the tonic, creating a temporary tonicization of that chord. {tonicComparison}\n\n In major: {majorExamples}. \n\nUsing A minor as an example: {minorExamples}.\n\n Each secondary dominant contains notes outside the home key — the chromatic alteration creates the leading-tone pull toward the target. In jazz, they often appear on weak beats and sometimes do not resolve downward.', tip: 'Treat the target chord as a temporary tonic: Mixolydian on the dominant if the chord is plain 7, Altered (or Half-Whole dim.) for b9/13b9 tensions. Jazz melodic minor a half-step above the dominant root gives maximum Altered tension. The shared tritone between 3rd and b7 is the engine — track those two guide tones resolving into the target chord.', isDynamic: true },

  'Secondary Leading-tone Diminished': { body: 'A fully diminished seventh (dim7) can function as a rootless V7b9. This is labeled vii°7 or vii°7/x when tonicizing a non-tonic target. You\'ll find the chord also as a vii°7 in harmonic minor. Each note of a diminished 7th chord may resolve to the chord a half-step above, and because dim7 is symmetric, one chord has four enharmonic equivalents: i°7 = biii°7 = #iv°7 = vi°7. For example: {enharmonicExample} — four enharmonic readings of the same symmetric shape. A dim7 should be treated as a functioning secondary leading-tone chord only when it resolves to one of those intended half-step-above targets.', tip: 'In your song: {majorMappings}. {minorMappings}. Practice approach: treat dim7 as rootless V7b9 language, then resolve into the target chord (often 3rd or root). Half-Whole diminished is the default, and Altered scale also works very well when hearing vii°7 as an implied V7alt pull. Example in this span: {spanExampleSentence}.', furtherStudy: 'As one shape can imply four roots, the musician can use {equivalencePairs}.', isDynamic: true },

  'Passing Diminished':{ body: 'A dim7 chord used as chromatic glue between stable chords. \n\nExample: {passingDimExample}. \n\nOften heard as a rootless V7b9, and, as a dim7 is symmetric, one shape can imply four roots. In this case, {dimRootSummary}.', tip: 'Fast rule: If you see the dim7 symbol use Whole-Half diminished scales. If you _hear_ it as rootless V7b9 {rootlessComparisonText}, solo from {impliedDominantLabel} with a Half-Whole diminished scale. Any dim chord tone can imply a dominant root a semitone below. Example in this span: {spanExampleSentence}.', furtherStudy: 'As one shape can imply four roots, the musician can use {equivalencePairs}.', isDynamic: true },

  'Extended Dominant': { body: 'A chain of dominant 7ths moving toward a final tonic. Example: {extDomExample}. Two forms: (1) V7/V — each dominant resolves up a 4th to the next; (2) Leading-tone approach — the first dominant is the leading tone of the target key, acting as an applied dominant approaching V7 of that key. Both forms create escalating dominant tension before tonic arrival.', tip: 'Treat each V7 independently: Mixolydian for inside colour, Altered for maximum tension, Half-Whole diminished for b9 language. On leading-tone approach dominants, Altered scale reinforces the leading-tone pull especially well. Keep 3rd and 7th guide tones moving by semitone between dominants.', isDynamic: true },

  'Ragtime Dominant Chain': { body: 'A dominant-only cadence path such as I7→II7→V7. Example: {ragtimeExample}. Instead of diatonic ii-V, each step is re-coloured as a dominant to intensify pull into the cadence zone. This sound is common in ragtime-derived harmony, blues turnarounds, and early jazz-influenced standards.', tip: 'Think of each chord as a temporary V7 of the next target. Use guide tones first (3rd and b7), then add Altered, Half-Whole, or Lydian Dominant colour per chord before resolving clearly at cadence.', isDynamic: true },

  'Deceptive Cadence':{ body: 'The dominant resolves to vi (minor) instead of I (major) — a surprise that delays arrival at home. Example: {deceptiveExample}. Common in classical and jazz ballads for emotional effect.', tip: 'As a soloist, act as if you\'re going to I, then pivot to Dorian on the vi to honour the surprise.', isDynamic: true },

  'Picardy Third':    { body: 'A minor chord suddenly switching to its parallel major — the III is raised a half-step, brightening the colour. Classical in origin, used in jazz for dramatic contrast.', tip: 'Highlight the raised 3rd as a melodic arrival note — it\'s the defining note that signals the shift.' },

  'Modal Interchange':{ body: 'A chord borrows colour from the parallel mode while the tonic centre stays the same. In jazz this often means major to minor tonic colour, borrowed iv, bVI, or bVII chords that sound "outside" without actually modulating.', tip: 'Quick rule: keep the home tonic in your ear, then target the borrowed tones. In major keys, the giveaway notes are usually b3, b6, and b7. Treat it as colour borrowing, not a full key change.' },


  'Circle of Fifths': { body: 'Four chords each resolving up a 4th (or down a 5th) — maximum harmonic momentum. Example: {circleExample}. The engine of much tonal music from Bach to bebop.', tip: 'Practice ii-V patterns in 4ths around the circle — this motion will appear in every standard you play.', isDynamic: true },

  'Coltrane Changes': { body: 'Three tonal centres each a major 3rd apart (dividing the octave into thirds). From "Giant Steps" and "Countdown" — the harmonic moves so fast the ear hears three simultaneous keys.', tip: 'Think in Maj7 arpeggios — each centre gets a quick major-7 or dominant arpeggio before the next jump.' },

  'Giant Steps':      { body: 'Two major-3rd-apart tonal centres, each approached by its own dominant. The definitive Coltrane harmonic device — demanding fast resolution across distant key areas.', tip: 'The II-V for each centre shares notes with the others — a single pentatonic built on the first tonic covers surprisingly much.' },

  'Sequential ii-Vs': { body: 'Two ii-V pairs whose tonal centres are a 5th apart. Example: {seqIIVExample}. This is one of the most common bebop movement engines and demands fast target-note control.', tip: 'Practical chain: ii = Dorian (or jazz melodic-minor colour), V = Altered/Lydian Dominant by context, then immediately reset for next ii-V. Keep 3rd-to-7th guide-tone lines continuous through the sequence.', isDynamic: true },

  'Dom Chain to I':   { body: 'A chain of dominant 7ths (often by 5ths or 4ths) delays tonic arrival while increasing pull. Example: {domChainExample}. Each dominant briefly acts like V of the next target.', tip: 'Treat each V7 independently: Use Mixolydian for colour, Altered for maximum tension, Half-Whole for b9 language. Keep guide tones moving by semitone between dominants.', isDynamic: true },

  'Neapolitan':       { body: 'A bII major chord (Neapolitan chord) moves down a half-step to tonic or dominant. Example: {neapExample}. The flat-2 gives a distinctive dark-meets-bright sound, common in classical and flamenco-influenced jazz.', tip: 'Treat the bII as a sub-V7 tonic substitute — its 3rd and 5th act like guide tones resolving chromatically.', isDynamic: true },

  'Chromatic Mediant':{ body: 'Two major or minor chords whose roots sit a major or minor 3rd apart with no obvious dominant connection — purely colouristic voice-leading. Lush and cinematic.', tip: 'Sustain common tones between the two chords, and move the non-common tones by half-step for the smoothest voice leading.' },

  'Direct Modulation': { body: 'An unprepared or abrupt modulation where the music changes key without warning — the impression is that you\'ve suddenly landed in a new key area. In major, the listener might hear Imaj7 → VII → Imaj7 → an unrelated Imaj7 (e.g. Fmaj7 → C11 → Fmaj7 → Abmaj7). In minor, im7 → VII → im7 → an unrelated chord like iim7 (e.g. Fm7 → C11 → Fm7 → Abm7). This device can also appear after V7, where the dominant doesn\'t resolve traditionally but pivots sideways to a new tonal centre.', tip: 'Think of each tonal centre as isolated from the last: play convincingly through the first key area, then land hard on the new chord, establishing it as the new harmonic home with your note choices. Use scale selections that confirm the new key: major scale on the new Imaj7, Dorian on the new im7. The C11 (or similar pivot chord) can sit between both keys — use its ambiguous harmony to bridge the gap, then commit fully to the new scale area.' },

  'Prepared Modulation': { body: 'A prepared modulation announces the new key before arrival. Instead of jumping directly, the harmony uses a setup chord or cadence such as V7, ii-V, iiø-V, or vii°7 to point clearly at the destination tonic. Major example: Fmaj7 -> C11 -> Fmaj7 -> Bbm7 -> Eb7 -> Abmaj7, heard as F: Imaj7 -> VII -> Imaj7, then Ab: iim7 -> V7 -> Imaj7. Minor example: Fm7 -> C11 -> Fm7 -> Bbm7b5 -> Eb7 -> Abm7, heard as Fm: im7 -> VII -> im7, then Abm: iiø7 -> V7 -> im7. Diminished preparation works the same way: Fmaj7 -> F°7 -> Gbmaj7, Fmaj7 -> Ab°7 -> Am7, Fm7 -> B°7 -> Cmaj7, or Fm7 -> C7alt -> Fm7 -> D°7 -> Ebm7.', tip: 'Hear the preparation as belonging to the destination key before you arrive. On ii-V or iiø-V, switch your ear to the new tonic immediately. On vii°7, remember each chord tone can resolve a half-step upward, and the symmetric dim7 shape can imply four enharmonic destinations.' },

  'Modal Vamp':       { body: 'A static modal centre repeated for several bars before a small shift (often up a semitone or to IV). This favours motif and rhythm over cadence-chasing.', tip: 'Inside-first rule: use one parent mode. Colour substitution rule: Dorian can be brightened with jazz melodic minor from the same root (Dorian with major 7) when you want forward, modern tension without changing root.' },

  'Side-Stepping':    { body: 'A line, voicing, or chord shape is briefly displaced by a semitone, then snapped back. In harmony this shows up as the same basic sonority moving up or down a half-step for one hit before returning.', tip: 'The rule is short tension, clear return. Strongest over dominants and modal vamps: play the real shape, slip it up or down a semitone, then resolve to the 3rd or 7th of the target chord.' },

  'Minor Blues Window': {
    title: 'Minor Blues Passage',
    body: 'A single minor blues scale can sometimes work across a half-diminished → minor → dominant passage as a colour sound. Why it works: the scale first behaves like upper-structure colour on the half-diminished chord, becomes stable on the minor chord, then turns into bluesy altered colour on the V7 chord.',

# Background.

This app was created to help musicians play jazz tunes by providing visual clues on a fretboard or keyboard.

If all you want to know is how to make beautiful music by moving some fingers about, please be patient. To get the most out of this app, it's best to understand what it does.

## What this app doesn't do.

So, firstly learn some melodies, then have a go at some solos. You'll find a lot of musical questions can be answered by studying the greats.

Learning from recordings trains the ears, helps with phrasing and generally helps give a picture of what makes a solo exciting and interesting.

Learning theory doesn't do that. Theory can help with the science, providing answers to musical puzzles, while completely avoiding its actual purpose. Music is art, not science!

It's an easy trap to fall into. Learning from recordings is a time-consuming task, whereas flicking through a theory book (or using this app) is less labour-intensive. Ideally, you should do both.

This manual mode allows time to consider your options, while the fade out shows all the notes available for the transition between chords. Playing these notes will give movement to your playing.

### First step

  'scalesLicks': `# Scales / Licks Quick Guide

## What do the buttons do

This panel is where you explore suggested scales and licks for the current chord or chord movement.

- \`Common Tones\`: jumps to the safest shared-note material between the current harmony and where it is heading.
- \`Categories\`: takes you to the grouped suggestion lists such as best fits, alternatives, blues colours, and genre ideas.
- \`Learn Scales\`: opens the stripped-down practice version so you can hear and see one scale idea more clearly.
- \`?\`: opens this quick guide.
- \`Save Scale\`: adds a scale layer over the chord tones already stored on a chord.
- \`Clear Scale\`: removes the currently shown scale from the instrument.

In this guide, 'select' means click on desktop or tap on touch devices.

This app uses chord panels to store a song's chord information.

This re-enforces the approach of thinking about chord tones and arpeggios first. Focussing on these chord tones keeps the song focussed, flowing and easy to follow.

If you want more musical material, this app has a selection of scales which then can be stored on top of a chord stored in the chord panels. You can then step through the chord progression and see the scales on the instrument panel.

## Does this app tell me exactly what to play?

Yes and no.

It suggests scales based on suitability against the chords playing, with alternatives and genre suggestions. Often, frustratingly, there is no single definitive answer for what to use. Listening to recordings is still the best way to answer musical questions.

You will notice that players often favour certain sounds, and that comes under playing style and musical trends.

What this app does offer is an informed choice and a chance to preview ideas.

## The Musical Journey

Music is not static. It always moves forward.

In this journey, you start with one chord and move toward a target chord.

In the app, depending on where you are in the song, you might want to look at the lead sheet to select the chord you are wanting to work on.

Behind the scenes, the app analyzes the chord progression. You can inspect this in the \`Chord Progression Analysis/Theory/Tips\` panel (referred to hereby as \`Theory\`). Its findings feed into the scales/licks panel.

You can treat the journey in two ways:

Method 1) Creating melodies that focus on one chord, before moving on to another and repeating the process.

When working on one chord at a time, select stop, or select a chord on the lead sheet line.

You should see something like:

- \`Scales For: Abdim\`

This brings that chord into focus and offers scale choices and licks for that chord.

If you see something like:

- \`Scales For: Abdim -> Amin7\`

and you want to work on just Abdim, select Abdim.

Method 2) Focussing on the movement from one chord to a target chord and practising material that either sets up the next chord or highlights the difference between them.

For moving from one chord to the other, use \`Fwd\` or \`Back\` and look for something like:


- \`Scales For: Abdim -> Amin7\`

If you do not see that style of display, try again. Check the arrow direction, make sure you're not going the wrong way!

If at any time you just want to focus on one chord — say the Abdim — you can select it on the lead sheet line or where it says Scales For: Abdim -> Amin7. If you see lots of blank circles, be sure to select Clear Scale so you can start afresh.

If you change your mind, or just wants to try another scale, select-

- \`Clear Scale\`: removes the currently shown scale from the instrument.

You cannot save a lick, but you can listen to it and work out how to play it.

## What Scales Are Offered?

### Common Tones

A great place to start. These are built from the chord or chords in play. Everything here works, so it is choose-your-own-adventure time.

Scales/licks are ranked by harmonic suitability. Bear in mind, the choices at the top may not always be what you want. More interesting choices may sit lower in the list.

### Categories

Choices organized into best or most suitable, alternatives, blues scales and genre-specific choices. Genre is influenced by a song's tag.

This is where adventure comes in.

Do you want:

- A strong contrast between chords?
- Extra tension before resolving?

It's up to you. A great idea is to practise the same set of chord changes with different combinations of scales and arpeggios. Have a go at some you haven't tried yet!

## So what does the display show?

Under each scale and lick, there are two numbers:

1. Likelihood of use over the current chord.

The app looks at the root, 3rd and 5th to determine suitability.

2. Likelihood of use over the next chord.

The app estimates this by looking at \`guide tones\`, the 7th and 3rd of the current chord and the 7th and 3rd of the next chord — these are often key melodic targets in jazz. By using guide tones, you can create an internal melody that follows the chords exactly while having an interesting contour. Root notes are useful, but can have less of a directional flow. The aim is to play chromatically, and tie everything together.

## Practical Use

## What this panel is for

## How it works

  'chordPanels': `# Chord Panels Quick Guide

Start here if you are wanting to explore the chord-tones and chromatic approach to playing jazz.

## Chord-Tone and Chromatic Playing

A practical way to use this is: keep arpeggios, chord tones and guide tones as your main targets, then add blues notes, chromatic passing notes, and enclosures as colour on the way before or after a target note. In other words, let the harmony lead, and let the chromatics decorate.

It can help to think of these as non-harmonic note types: passing notes, neighbour notes, and suspensions as anticipations resolving into chord tones.

For chromatics and enclosures, a simple rule is to place your target chord tones on stronger beats, and let chromatic notes do the connecting on weaker beats.

For blues language, two useful approaches are: (1) keep one minor blues sound across a full blues chorus, or (2) move major blues with the chord roots (I, IV, V) to outline harmony more clearly.

If you stay on one common blues scale while chords move, re-target each new chord's 3rd or 7th at the chord change so the line keeps outlining harmony.

## What are Chord Panels?

Chord panels are where to start with and manage the chords for your song. Each panel represents an individual chord in your progression which can be modified, dragged, and re-organized to suit.

These feed into the instrument panel, the scales/licks suggestions, and theory analysis panels. They are a key part of how you interact with the app.

## Creating and Editing Chords

Click on a chord panel to select it and edit its properties:

- **Root**: The root note of the chord (C, C#, D, etc.)
- **Quality**: Major, Minor, Dominant, Half-diminished, Diminished, etc.
- **Extensions**: Add 9ths, 11ths, 13ths for color
- **Alterations**: Flat or sharp extensions (b9, #9, #11, b13, etc.)
- **Beats**: How many beats (quarter notes) the chord lasts

## Dragging Chords

You can drag chords to rearrange your progression. Select and hold a chord panel, then drag it to a new position. This is useful for reordering sections or experimenting with different harmonic movements.

## Song Length

At the top of the Chord Panels, set your **Song Length In Bars**. This determines how much space you have to work with. You can expand or reduce this as needed.

## Tips

- Start with simple triads (root, 3rd, 7th) before adding color
- Use extensions to add sophistication and movement
- Adding enough notes can create a chord that is essentially a scale
- Try dragging chords to discover new harmonic progressions
- Listen to how chords sound together by clicking Play`,

  'theoryAnalysis': `# Chord Progression Analysis

## What this does

This is the brain of the app. It has performed deep analysis of a songs harmonic structure.
Here are explanations of chords function, where the key centre is, and what larger harmonic patterns are being detected.

- \`Simple\`: shows the shortest, easiest-to-read version of the analysis.
- \`Advanced\`: shows the fuller theory view with extra detail, labels, and chord tools.
- Practice Window buttons like \`All\`, \`2b\`, or \`4b\`: limit analysis and playback focus to a smaller section.
- \`«\`, \`‹\`, \`›\`: move the active practice window backward or forward through the tune.
- \`Analysis\` section were you see a detailed breakdown of harmonic function of a set of chords, a
- \`Roadmap\`suggestions section that highlights any noteable song features like cadences and key changes. Selecting these will provide further information and play an example.
- \`Tips\` section, some of the tiles are for things like a glossary, guide to the Roman Numeral System and so on. Others are like a deck of cards that get pulled into \`Roadmap\`suggestion tiles, when a musical scenario calls then into play.
- \`?\`: opens this theory help screen.

## Practice Window

The Practice Window control at the top of the panel lets you focus analysis and playback on a specific bar range within the song. Use it to zero in on a tricky section.

## What it shows

The \`Roadmap\` section identifies functional relationships in the progression — ii-V-I patterns, secondary dominants, tritone substitutions, diminished chords, blues windows, and modal interchange. Each item gives you a label, a brief explanation, and a bar-range reference.

The \`Tips\` section is like a decks of cards. They are full of information. A glossary that type of thing.
Some of these cards, for example, using the blues scale,  are taken from the deck and shown as a \`Roadmap\`suggestion when they can be applied in a tune.

## Simple vs Advanced

Use the \`Simple\` button for a condensed view that focuses on the most important findings. Use \`Advanced\` for the full analysis with more detail on each entry.

## How to use it

1. Load a song or build your chord progression in \`Chord Panels\`.
2. Open \`Theory\` to see what functional patterns have been detected.
3. Use the \`Roadmap\` entries to understand which chords are acting as which function.
4. Cross-reference with the \`Scales/Licks\` panel — the analysis here feeds directly into the scale suggestions shown there.

## Key centre

When a clear key is detected, it will appear at the top of the analysis. Chords are labelled by their Roman numeral function within that key.

If the progression moves through multiple key areas, each section will be identified separately.`,

  'loadSave': `# Song Library

## What this button does

This panel manages your song library.

- \`Save New\`: saves the current chart as a new song or a new version.
- \`Load Selected\`: loads the song chosen in the library dropdown.
- \`Save Current\`: overwrites the currently loaded saved song with your edits.
- \`Show Advanced\`: reveals backup, sorting, stock-replacement, validation, and delete tools.

This panel manages your saved songs. Use it to store chord progressions, load previous tunes, and organise your library.

## Saving a song

Type a name in the song name field and press **Save As**. If you want to categorise the song (for example by style or origin), add a category using the category field. The song will be stored in your browser's local storage.

## Loading a song

Select a song from the load dropdown and press **Load**. The chord progression, bar count, and settings will all be restored.

## Overwriting a song

If you load a song, make changes, and want to keep them under the same name, use **Save As** with the same name. The app will confirm before overwriting.

## Organising by category

Songs can be grouped by category (e.g. Blues, Standards, Originals). Use the category field when saving. The load list can be filtered by category so you can find tunes quickly.

## Exporting and importing

Use the **Export** button to download your full song library as a JSON file. Use **Import** to load a previously exported library file. This is useful for backup or for moving your songs to another device.

## Tips

- Give songs consistent names so they are easy to search and filter.

  'settings': `# Settings

## What this button does

This panel adjusts playback feel, sound, and metronome behaviour without changing the harmony itself.

- \`Instrument View\`: returns you to the main options/instrument area.
- \`?\`: opens this Settings help screen.
- \`Master Volume\`: sets the overall output level for the app.
- \`Piano Tone\`: switches between the available piano sound flavours.
- \`Note Length (% of beat)\`: changes how long playback notes ring for.
- \`Humanize Amount (%)\`: adds timing and velocity variation so playback sounds less mechanical.
- \`Comping Placement\`: pushes the chord playback slightly ahead of or behind the beat.
- \`Reverb Amount (%)\`: controls the hall reverb mix.
- \`Metronome Volume\`: sets the click level separately from the instrument.
- \`Subdivision\`: changes the metronome pattern, including straight, swing, and clave options.
- \`Accent Every (N beats)\`: sets how often the metronome gives a stronger pulse.
- \`Swing Feel (first 8th %)\`: adjusts how far the swung eighth note leans toward a triplet feel.

## What this panel is for

Use Settings when you want the app to feel better to practise with.

It is less about theory and more about playback response: how dry or roomy the piano sounds, how strict or relaxed the timing feels, and how the metronome supports your practice.

## Practical use

- Lower \`Humanize Amount\` for cleaner, more clinical playback when you are checking harmony.
- Raise it when you want a looser comping feel.
- Push \`Comping Placement\` slightly behind the beat for a laid-back pocket, or slightly ahead for more urgency.
- Use \`Swing Feel\` and \`Subdivision\` together when practising different rhythmic feels.
- Keep \`Metronome Volume\` independent from \`Master Volume\` so the click supports you without dominating the sound.`,
