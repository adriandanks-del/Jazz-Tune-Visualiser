 'Tonic:the tonic is the home base or resting point of a tune or a section of a tune. It’s the chord or tonal center where the harmony feels most resolved. Tonicisation is when a chord temporarily becomes a tonic',

'Cadence: brings a section of music to a close, signaling the end of a phrase. Cadences can be conclusive, providing a sense of finality, or inconclusive, creating a sense of anticipation. Cadences are essential for the harmonic structure of compositions, guiding improvisations and transitions between sections.',

  `Voice leading: smooth movement of the important tones (especially 3rds/7ths) between chords.Good voice-leading facilitates coherent, melodic transitions between chords,

 contributing to the fluidity and expressiveness of jazz harmonies.`,

  'Guide tones: usually the 3rd and 7th; they define chord quality and voice-leading direction.',

  'Resolution: the transition from dissonance to consonance, often by a half or full step (e.g. 7th resolving down, 3rd resolving up).',

  'Approach tone: a note (often chromatic) that resolves directly into a target tone. Used to embellesh the melody, create tension or smooth transions between notes',

  'Enclosure: playing the notes on either side of the target note before resolving to it. This creates a tension and release effect that is characteristic of jazz music., ',

  'Passing note: a connecting note between two chord/scale tones.',

  'Neighbour note: a step above or below a stable tone that returns to the original tone.',
  'Anticipation: a note from the next chord played early before the harmony changes.',
  'Suspension: holding a previous note into a new chord, then resolving it.',
  'Inside playing: lines that clearly fit the song\'s chord changes and key.',
  'Outside playing: improvisation that ventures beyond the established harmonic framework of a piece, often using atonal, chromatic, or otherwise unconventional pitches to create tension.',
  'ii-V-I / ii-V-i: core jazz cadence patterns in major/minor contexts.',
  'Tritone sub: replacing V7 with bII7 while preserving dominant guide-tone pull.',
  'Modal interchange: borrowing colours from the parallel mode without fully changing key.',
  
];

function buildScaleSummaryLines() {
  const allNames = FAM_MODES.map(mode => mode.name);
  const uniqueNames = (items) => Array.from(new Set(items));
  const chunk = (items, size) => {
    const parts = [];
    for (let i = 0; i < items.length; i += size) {
      parts.push(items.slice(i, i + size));
    }
    return parts;
  };

  const commonNames = uniqueNames(FAM_MODES.filter(mode => (mode.tags || []).includes('common')).map(mode => mode.name));
  const bluesyNames = uniqueNames(FAM_MODES.filter(mode => (mode.tags || []).includes('bluesy')).map(mode => mode.name));
  const bebopNames = uniqueNames(FAM_MODES.filter(mode => (mode.tags || []).includes('bebop')).map(mode => mode.name));
  const colourNames = allNames.filter(name => !commonNames.includes(name) && !bluesyNames.includes(name) && !bebopNames.includes(name));

  const allScaleLines = chunk(allNames, 8).map((group, idx) => `${idx === 0 ? 'All scales' : 'All scales (cont.)'}: ${group.join(', ')}`);

  return [
    `Total scales in this app: ${allNames.length}.`,
    `Common/inside first choices: ${commonNames.join(', ')}.`,
    `Blues-focused palette: ${bluesyNames.join(', ')}.`,
    `Bebop-focused palette: ${bebopNames.join(', ')}.`,
    `Alternative colour scales: ${colourNames.join(', ')}.`,
    'V7b9 quick rule: resolving to minor, start with Phrygian Dominant (5th mode of Harmonic Minor); for more altered tension or diminished symmetry, use Half-Whole diminished.',
    'Quick workflow: target 3rd/7th first, then add tensions/chromatic connectors that match the chord function.',
    ...allScaleLines
  ];
}

function analyzeJazzRoadmap(chords, useFlats) {
  const analyzed = chords.map((ch, index) => ({
    ...ch,
    index,
    rootIdx: NOTE_TO_INDEX[ch.root],
    family: chordFamily(ch.quality),
    label: chordDisplayLabel(ch, useFlats)
  }));
  const chordStartBarByIndex = [];
  let beatsCursor = 0;
  for (let i = 0; i < analyzed.length; i++) {
    chordStartBarByIndex[i] = (beatsCursor / 4) + 1;
    const beats = Number(analyzed[i]?.beats);
    beatsCursor += Number.isFinite(beats) && beats > 0 ? beats : 4;
  }
  const findings = [];
  const seen = new Set();
  const addFinding = (type, detail, span, meta = null) => {
    const key = `${type}:${detail}:${span}`;
    if (seen.has(key)) return;
    seen.add(key);
    findings.push({ type, detail, span, ...(meta || {}) });
  };
  // Pre-scan: collect 0-indexed positions of V chords that are already the V of a ii-V-I or ii-V-i.
  // The V in those patterns is the primary dominant — it must NOT be re-labelled as Secondary Dominant.
  const iiVDominantPositions = new Set();
  for (let i = 0; i < analyzed.length - 2; i++) {
    const a = analyzed[i];
    const b = analyzed[i + 1];
    const c = analyzed[i + 2];
    if (
      (a.family === 'minor' || a.family === 'half-diminished') &&
      b.family === 'dominant' &&
      (c.family === 'major' || c.family === 'minor') &&
      pc(a.rootIdx - c.rootIdx) === 2 &&
      pc(b.rootIdx - c.rootIdx) === 7
    ) {
      iiVDominantPositions.add(i + 1); // b (the V) is at 0-indexed position i+1
    }
  }
  const isTonicFamily = family => family === 'major' || family === 'minor';
  const isRelativeMajorMinorPair = (fromChord, toChord) => {
    if (!fromChord || !toChord) return false;
    if (!isTonicFamily(fromChord.family) || !isTonicFamily(toChord.family)) return false;
    if (fromChord.family === toChord.family) return false;
    const relInt = pc(toChord.rootIdx - fromChord.rootIdx);
    return relInt === 3 || relInt === 9;
  };
  const isDiatonicToKey = (chordRootIdx, keyRootIdx, keyChordFamily) => {
    // Check if a chord root is diatonic to a given key
    // Infer key mode from the tonic chord's family: major chord = major scale, minor = minor scale
    if (!keyChordFamily) keyChordFamily = 'major';
    const scale = keyChordFamily === 'minor' ? MINOR_SCALE : MAJOR_SCALE;
    const interval = pc(chordRootIdx - keyRootIdx);
    return scale.includes(interval);
  };
  const findPreviousTonicAnchor = (startIndex, targetRootIdx, lookback = 4) => {
    for (let j = startIndex - 1; j >= Math.max(0, startIndex - lookback); j--) {
      const candidate = analyzed[j];
      if (!candidate || !isTonicFamily(candidate.family)) continue;
      if (candidate.rootIdx === targetRootIdx) return null;
      return candidate;
    }
    return null;
  };
  const hasLocalTonicAnchor = (pairStartIndex, tonicRootIdx) => {
    const prev = analyzed[pairStartIndex - 1];
    const next = analyzed[pairStartIndex + 2];
    return (prev && isTonicFamily(prev.family) && prev.rootIdx === tonicRootIdx)
      || (next && isTonicFamily(next.family) && next.rootIdx === tonicRootIdx);
  };
  const isLikelyPhraseStart = (index) => {
    const startBar = chordStartBarByIndex[index];
    if (!Number.isFinite(startBar)) return false;
    const rounded = Math.round(startBar);
    if (Math.abs(startBar - rounded) > 0.001) return false;
    return rounded > 1 && ((rounded - 1) % 4 === 0);
  };
  const hasCadentialConfirmationNear = (targetIndex, tonicRootIdx, tonicFamily, searchRadius = 3) => {
    const start = Math.max(2, targetIndex - searchRadius);
    const end = Math.min(analyzed.length - 1, targetIndex + searchRadius);
    for (let t = start; t <= end; t++) {
      const tonic = analyzed[t];
      if (!tonic || tonic.rootIdx !== tonicRootIdx || tonic.family !== tonicFamily) continue;
      const ii = analyzed[t - 2];
      const v = analyzed[t - 1];
      if (!ii || !v) continue;
      const iiIsPredominant = ii.family === 'minor' || ii.family === 'half-diminished';
      const vIsDominant = v.family === 'dominant';
      const iiToTonic = pc(ii.rootIdx - tonic.rootIdx) === 2;
      const vToTonic = pc(v.rootIdx - tonic.rootIdx) === 7 || pc(v.rootIdx - tonic.rootIdx) === 1;
      if (iiIsPredominant && vIsDominant && iiToTonic && vToTonic) return true;
    }
    return false;
  };

  for (let i = 0; i < analyzed.length - 1; i++) {
    const first = analyzed[i];
    const second = analyzed[i + 1];
    const tonicAnchoredOnSecond = hasLocalTonicAnchor(i, second.rootIdx);
    const borrowedBviiColor = first.family === 'major' && second.family === 'major' && pc(second.rootIdx - first.rootIdx) === 2 && tonicAnchoredOnSecond;
    const borrowedBviColor = first.family === 'major' && (second.family === 'major' || second.family === 'dominant') && pc(second.rootIdx - first.rootIdx) === 4 && tonicAnchoredOnSecond;

    if (first.family === 'major' && second.family === 'minor' && first.rootIdx === second.rootIdx) {
      addFinding('Modal Interchange', `${first.label} borrows parallel minor colour as ${second.label}`, `${i + 1}-${i + 2}`, { tags: ['parallel-minor'] });
    }

    if (first.family === 'minor' && second.family === 'major' && pc(first.rootIdx - second.rootIdx) === 5) {
      addFinding('Modal Interchange', `${first.label} acts as borrowed iv moving into ${second.label}`, `${i + 1}-${i + 2}`, { tags: ['borrowed-iv'] });
    }

    if (borrowedBviiColor) {
      addFinding('Modal Interchange', `${first.label} acts as borrowed bVII moving into ${second.label}`, `${i + 1}-${i + 2}`, { tags: ['borrowed-bvii'] });
    }

    if (borrowedBviColor) {
      addFinding('Modal Interchange', `${first.label} acts as borrowed bVI colour before ${second.label}`, `${i + 1}-${i + 2}`, { tags: ['borrowed-bvi'] });
    }

    if (first.family === 'minor' && second.family === 'major' && first.rootIdx === second.rootIdx) {
      addFinding('Picardy Third', `${first.label} resolves to parallel major ${second.label}`, `${i + 1}-${i + 2}`);
    }

    if (first.family === 'dominant' && (second.family === 'major' || second.family === 'minor') && pc(first.rootIdx - second.rootIdx) === 1) {
      addFinding('Tritone Sub', `${first.label} resolves by half-step into ${second.label}`, `${i + 1}-${i + 2}`);
    }

    if (first.family === 'dominant' && second.family !== 'other' && pc(second.rootIdx - first.rootIdx) === 5 && !iiVDominantPositions.has(i)) {
      const secondaryDetail = second.family === 'dominant'
        ? `${first.label} tonicizes dominant target ${second.label} (V7 of dominant)`
        : `${first.label} tonicizes ${second.label}`;
      addFinding('Secondary Dominant', secondaryDetail, `${i + 1}-${i + 2}`);
    }

    // Secondary leading-tone diminished (vii°7/x): dim7 acting as rootless V7b9.
    // Functional when the next chord root is a half-step above any dim7 chord tone.
    if (first.family === 'diminished' && normalizeQuality(first.quality) === 'dim7' && second.family !== 'diminished' && second.family !== 'other') {
      const intendedTargets = [1, 4, 7, 10];
      const targetInterval = pc(second.rootIdx - first.rootIdx);
      if (intendedTargets.includes(targetInterval)) {
        addFinding('Secondary Leading-tone Diminished', `${first.label} functions as vii°7/x resolving to ${second.label}`, `${i + 1}-${i + 2}`);
      }
    }

    // Extended Dominant: V7 → V7 chain heading to the same tonic.
    // Two forms: (1) V/V — second root is a 4th above first (pc=5), e.g. A7→D7→G;
    //            (2) leading-tone approach — first is one semitone below the eventual tonic while second is V7 of that tonic,
    //               e.g. Gb7→D7→G where Gb is the leading tone of G and D7 is V7/G.
    if (first.family === 'dominant' && second.family === 'dominant' && !iiVDominantPositions.has(i)) {
      const interval = pc(second.rootIdx - first.rootIdx);
      if (interval === 5) {
        addFinding('Extended Dominant', `${first.label} → ${second.label} (V of V chain)`, `${i + 1}-${i + 2}`);
      } else if (interval === 8) {
        const third = analyzed[i + 2];
        if (third && third.family !== 'other' && pc(third.rootIdx - second.rootIdx) === 5) {
          addFinding('Extended Dominant', `${first.label} → ${second.label} (leading-tone dominant chain to ${third.label})`, `${i + 1}-${i + 3}`);
        } else if (!third && i === analyzed.length - 2) {
          const impliedTonic = displayNote(pc(second.rootIdx + 5), useFlats);
          addFinding('Extended Dominant', `${first.label} → ${second.label} (leading-tone dominant chain, implied resolution to ${impliedTonic})`, `${i + 1}-${i + 2}`);
        }
      }
    }

    // V7 sidesteps to vi instead of resolving to I.
    // Require local tonic expectation (nearby I) to avoid flagging plain diatonic scale runs.
    if (first.family === 'dominant' && second.family === 'minor' && pc(second.rootIdx - first.rootIdx) === 2) {
      const expectedTonicRoot = pc(first.rootIdx + 5);
      const hasLocalTonicExpectation = hasLocalTonicAnchor(i, expectedTonicRoot);
      if (hasLocalTonicExpectation) {
        addFinding('Deceptive Cadence', `${first.label} avoids I, side-steps to ${second.label}`, `${i + 1}-${i + 2}`);
      }
    }

    // bVII7 sub-dominant motion (dominant a whole step below resolves up to major)
    if (first.family === 'dominant' && second.family === 'major' && pc(second.rootIdx - first.rootIdx) === 2) {
      addFinding('Backdoor Cadence', `${first.label} (bVII7) sub-dominates to ${second.label}`, `${i + 1}-${i + 2}`);
    }

    // Neapolitan: flat-II major chord resolves down a semitone to tonic
    if (first.family === 'major' && (second.family === 'major' || second.family === 'minor') && pc(first.rootIdx - second.rootIdx) === 1) {
      addFinding('Neapolitan', `${first.label} (bII) resolves down by half-step to ${second.label}`, `${i + 1}-${i + 2}`);
    }

    // Chromatic Mediant: non-dominant chords moving by a minor or major 3rd
    // EXCLUDE: secondary dominants (B7, C7, etc.), diatonic progressions (minor→major 3rd like ii-IV), or common functional intervals
    const medInt = pc(second.rootIdx - first.rootIdx);
    const isSecondaryDominant = second.family === 'dominant' && second.label.includes('7');
    const isDiatonicFunctional = (medInt === 5 || medInt === 7); // Perfect 4ths and 5ths are typically functional
    const isPureMediantMotion = (medInt === 3 || medInt === 4 || medInt === 8 || medInt === 9);
    
    // Exclude minor→major 3rd jumps (like ii-IV), which are common diatonic progressions, not coloristic moves
    const isDiatonicMinorToMajor = isPureMediantMotion && first.family === 'minor' && second.family === 'major';
    
    if ((first.family === 'major' || first.family === 'minor') && (second.family === 'major' || second.family === 'minor') && 
        isPureMediantMotion && !isSecondaryDominant && !isDiatonicFunctional && !isDiatonicMinorToMajor && !borrowedBviColor) {
      addFinding('Chromatic Mediant', `${first.label} moves by 3rd to ${second.label}`, `${i + 1}-${i + 2}`);
    }

    // Direct Modulation: unprepared jump to a new tonal centre
    // Detect when two major/minor chords of different roots appear without harmonic preparation
    const pairAnchor = findPreviousTonicAnchor(i + 1, second.rootIdx, 6);
    const pairLooksDiatonic = !!(pairAnchor
      && isDiatonicToKey(first.rootIdx, pairAnchor.rootIdx, pairAnchor.family)
      && isDiatonicToKey(second.rootIdx, pairAnchor.rootIdx, pairAnchor.family));
    const hasCadentialConfirmation = hasCadentialConfirmationNear(i + 1, second.rootIdx, second.family);
    if ((first.family === 'major' || first.family === 'minor')
      && (second.family === 'major' || second.family === 'minor')
      && first.rootIdx !== second.rootIdx
      && medInt !== 1
      && medInt !== 11
      && medInt !== 2
      && medInt !== 10
      && hasCadentialConfirmation
      && !pairLooksDiatonic) {
      // Exclude patterns that are already categorized (mediant motion, tritone sub, backdoor, deceptive)
      const isMediant = (medInt === 3 || medInt === 4 || medInt === 8 || medInt === 9);
      const isTritoneSub = (first.family === 'dominant' && medInt === 1);
      const isBackdoor = (first.family === 'dominant' && medInt === 2);
      const isDeceptive = (first.family === 'dominant' && second.family === 'minor' && medInt === 2);
      const isCommonFunctionalMotion = (medInt === 5 || medInt === 7);
      
      if (!isMediant && !isTritoneSub && !isBackdoor && !isDeceptive && !isCommonFunctionalMotion) {
        addFinding('Direct Modulation', `${first.label} modulates directly to ${second.label} without preparation`, `${i + 1}-${i + 2}`);
      }
    }
  }

  for (let i = 0; i < analyzed.length - 2; i++) {
    const a = analyzed[i];
    const b = analyzed[i + 1];
    const c = analyzed[i + 2];
    const tonicName = displayNote(c.rootIdx, useFlats);

    if (normalizeQuality(a.quality) === normalizeQuality(b.quality) && normalizeQuality(b.quality) === normalizeQuality(c.quality) && a.rootIdx === c.rootIdx && pc(b.rootIdx - a.rootIdx) === 1) {
      addFinding('Side-Stepping', `${a.label} slips up a semitone to ${b.label} then returns to ${c.label}`, `${i + 1}-${i + 3}`);
    }

    if (normalizeQuality(a.quality) === normalizeQuality(b.quality) && normalizeQuality(b.quality) === normalizeQuality(c.quality) && a.rootIdx === c.rootIdx && pc(b.rootIdx - a.rootIdx) === 11) {
      addFinding('Side-Stepping', `${a.label} slips down a semitone to ${b.label} then returns to ${c.label}`, `${i + 1}-${i + 3}`);
    }

    if ((a.family === 'minor' || a.family === 'half-diminished') && b.family === 'dominant' && c.family === 'major' && pc(a.rootIdx - c.rootIdx) === 2 && pc(b.rootIdx - c.rootIdx) === 7) {
      addFinding('ii-V-I', `into ${tonicName}: ${a.label} -> ${b.label} -> ${c.label}`, `${i + 1}-${i + 3}`);
      const nextChord = analyzed[i + 3];
      if (nextChord && (nextChord.family === 'major' || nextChord.family === 'minor') && pc(nextChord.rootIdx - c.rootIdx) === 5) {
        addFinding('Cadence Overrun', `${a.label} -> ${b.label} -> ${c.label} overruns to ${nextChord.label}`, `${i + 1}-${i + 4}`);
      }
      if (nextChord && nextChord.family === 'dominant' && pc(nextChord.rootIdx - c.rootIdx) === 9) {
        addFinding('Cadence Dropback', `${a.label} -> ${b.label} -> ${c.label} dropbacks via ${nextChord.label}`, `${i + 1}-${i + 4}`);
      }
      if (isLikelyPhraseStart(i + 2)) {
        addFinding('Launcher', `${a.label} -> ${b.label} launches into new phrase on ${c.label}`, `${i + 1}-${i + 3}`);
      }
      const priorTonic = findPreviousTonicAnchor(i, c.rootIdx);
      const tonicAnchored = hasLocalTonicAnchor(i, c.rootIdx);
      // Only flag as Prepared Modulation if destination is NOT diatonic to the prior key and is a true harmonic separation
      const isDestDiatonic = priorTonic && isDiatonicToKey(c.rootIdx, priorTonic.rootIdx, priorTonic.family);
      if (priorTonic && tonicAnchored && !isRelativeMajorMinorPair(priorTonic, c) && !isDestDiatonic) {
        addFinding('Prepared Modulation', `${priorTonic.label} moves to ${c.label} via ii-V preparation ${a.label} -> ${b.label}`, `${priorTonic.index + 1}-${i + 3}`);
      }
    }

    if ((a.family === 'minor' || a.family === 'half-diminished') && b.family === 'dominant' && c.family === 'minor' && pc(a.rootIdx - c.rootIdx) === 2 && pc(b.rootIdx - c.rootIdx) === 7) {
      const priorTonic = findPreviousTonicAnchor(i, c.rootIdx);
      const tonicAnchored = hasLocalTonicAnchor(i, c.rootIdx);
      const isDestDiatonic = priorTonic && isDiatonicToKey(c.rootIdx, priorTonic.rootIdx, priorTonic.family);
      const hasPreparedModulation = !!(priorTonic && tonicAnchored && !isRelativeMajorMinorPair(priorTonic, c) && !isDestDiatonic);
      const iiViMinorDetail = hasPreparedModulation
        ? `minor resolution to ${tonicName}: ${a.label} -> ${b.label} -> ${c.label}`
        : `local minor tonicization to ${tonicName} (no key change): ${a.label} -> ${b.label} -> ${c.label}`;
      addFinding('ii-V-i', iiViMinorDetail, `${i + 1}-${i + 3}`);
      const nextChord = analyzed[i + 3];
      if (nextChord && (nextChord.family === 'major' || nextChord.family === 'minor') && pc(nextChord.rootIdx - c.rootIdx) === 5) {
        addFinding('Cadence Overrun', `${a.label} -> ${b.label} -> ${c.label} overruns to ${nextChord.label}`, `${i + 1}-${i + 4}`);
      }
      if (nextChord && nextChord.family === 'dominant' && pc(nextChord.rootIdx - c.rootIdx) === 9) {
        addFinding('Cadence Dropback', `${a.label} -> ${b.label} -> ${c.label} dropbacks via ${nextChord.label}`, `${i + 1}-${i + 4}`);
      }
      if (isLikelyPhraseStart(i + 2)) {
        addFinding('Launcher', `${a.label} -> ${b.label} launches into new phrase on ${c.label}`, `${i + 1}-${i + 3}`);
      }
      if (hasPreparedModulation) {
        addFinding('Prepared Modulation', `${priorTonic.label} moves to ${c.label} via ii-V preparation ${a.label} -> ${b.label}`, `${priorTonic.index + 1}-${i + 3}`);
      }
    }

    if (a.family === 'minor' && b.family === 'dominant' && c.family === 'major' && pc(a.rootIdx - c.rootIdx) === 5 && pc(b.rootIdx - c.rootIdx) === 10) {
      addFinding('Backdoor Dominant', `into ${tonicName}: ${a.label} -> ${b.label} -> ${c.label}`, `${i + 1}-${i + 3}`);
    }

    if (a.family === 'major' && b.family === 'minor' && c.family === 'dominant' && pc(b.rootIdx - a.rootIdx) === 9 && pc(c.rootIdx - a.rootIdx) === 2) {
      addFinding('I-vi-ii-V', `${a.label} -> ${b.label} -> ${c.label} setup`, `${i + 1}-${i + 3}`);
    }

    if (a.family === 'major' && b.family === 'dominant' && c.family === 'dominant' && pc(b.rootIdx - a.rootIdx) === 9 && pc(c.rootIdx - a.rootIdx) === 2) {
      addFinding('I-VI-II', `${a.label} moves through dominant chain ${b.label} -> ${c.label}`, `${i + 1}-${i + 3}`);
    }

    if (a.family === 'major' && b.family === 'dominant' && c.family === 'major' && pc(b.rootIdx - a.rootIdx) === 5 && pc(c.rootIdx - a.rootIdx) === 5) {
      addFinding('Tonicization of IV', `${a.label} -> ${b.label} -> ${c.label}`, `${i + 1}-${i + 3}`);
    }

    // Sub-V ii-V-I: standard ii but V is the tritone sub (bII7), resolves by half-step down to I
    if ((a.family === 'minor' || a.family === 'half-diminished') && b.family === 'dominant' && (c.family === 'major' || c.family === 'minor') && pc(a.rootIdx - c.rootIdx) === 2 && pc(b.rootIdx - c.rootIdx) === 1) {
      addFinding('Sub-V ii-V-I', `tritone sub V into ${tonicName}: ${a.label} -> ${b.label} -> ${c.label}`, `${i + 1}-${i + 3}`);
    }

    // Coltrane Changes: three tonic chords each a major 3rd lower (Giant Steps macro-cycle)
    if ((a.family === 'major' || a.family === 'dominant') && (b.family === 'major' || b.family === 'dominant') && (c.family === 'major' || c.family === 'dominant') && pc(a.rootIdx - b.rootIdx) === 4 && pc(b.rootIdx - c.rootIdx) === 4) {
      addFinding('Coltrane Changes', `major-3rd descent: ${a.label} -> ${b.label} -> ${c.label}`, `${i + 1}-${i + 3}`);
    }

    // Passing Diminished: diminished chord resolves chromatically up to next chord
    // NOTE: passing diminished is chromatic color, NOT a modulation indicator—do not flag as "Prepared Modulation"
    if (b.family === 'diminished' && pc(c.rootIdx - b.rootIdx) === 1) {
      addFinding('Passing Diminished', `${b.label} lifts by half-step to ${c.label}`, `${i + 1}-${i + 3}`);
    }

    // Chain of Secondary Dominants: V7/V → V7 → I (two dominants each resolving up a 4th)
    if (a.family === 'dominant' && b.family === 'dominant' && c.family === 'major' && pc(b.rootIdx - a.rootIdx) === 5 && pc(c.rootIdx - b.rootIdx) === 5) {
      addFinding('Dom Chain to I', `${a.label} -> ${b.label} drives into ${c.label}`, `${i + 1}-${i + 3}`);
    }

    // Ragtime/blues dominant chain color: I7 -> II7 -> V7 (or same interval profile from another root)
    if (a.family === 'dominant' && b.family === 'dominant' && c.family === 'dominant' && pc(b.rootIdx - a.rootIdx) === 2 && pc(c.rootIdx - b.rootIdx) === 5) {
      addFinding('Ragtime Dominant Chain', `${a.label} -> ${b.label} -> ${c.label} (dominant chain toward cadence)`, `${i + 1}-${i + 3}`);
    }

    // Gypsy minor cadence color: minor tonic -> dominant -> minor tonic (often m6 quality)
    if (a.family === 'minor' && b.family === 'dominant' && c.family === 'minor' && a.rootIdx === c.rootIdx) {
      addFinding('Gypsy Cadence', `${a.label} -> ${b.label} -> ${c.label}`, `${i + 1}-${i + 3}`);
    }
  }

  for (let i = 0; i < analyzed.length - 3; i++) {
    const a = analyzed[i];
    const b = analyzed[i + 1];
    const c = analyzed[i + 2];
    const d = analyzed[i + 3];
    if (a.family === 'major' && b.family === 'minor' && (c.family === 'minor' || c.family === 'half-diminished') && d.family === 'dominant' && pc(b.rootIdx - a.rootIdx) === 9 && pc(c.rootIdx - a.rootIdx) === 2 && pc(d.rootIdx - a.rootIdx) === 7) {
      addFinding('Turnaround', `in ${displayNote(a.rootIdx, useFlats)}: ${a.label} -> ${b.label} -> ${c.label} -> ${d.label}`, `${i + 1}-${i + 4}`);
    }

    if ((a.family === 'major' || a.family === 'minor') && b.family === 'dominant' && c.family === 'dominant' && d.family === 'dominant' && pc(b.rootIdx - a.rootIdx) === 4 && pc(c.rootIdx - a.rootIdx) === 9 && pc(d.rootIdx - a.rootIdx) === 2) {
      addFinding('Rhythm Changes Bridge', `${a.label} launches III7-VI7-II7-V7 motion`, `${i + 1}-${i + 4}`);
    }

    if ((a.family === 'major' || a.family === 'minor') && b.family === 'dominant' && c.family === 'dominant' && d.family === 'dominant' && pc(a.rootIdx - b.rootIdx) === 5 && pc(b.rootIdx - c.rootIdx) === 5 && pc(c.rootIdx - d.rootIdx) === 5) {
      addFinding('Circle of Fifths', `${a.label} -> ${b.label} -> ${c.label} -> ${d.label}`, `${i + 1}-${i + 4}`);
    }

    if (a.family === 'minor' && b.family === 'dominant' && (c.family === 'minor' || c.family === 'major') && d.family === 'dominant' && pc(a.rootIdx - c.rootIdx) === 5 && pc(b.rootIdx - c.rootIdx) === 10 && pc(d.rootIdx - c.rootIdx) === 7) {
      addFinding('Backdoor Setup', `${a.label} -> ${b.label} prepares ${c.label}, then ${d.label}`, `${i + 1}-${i + 4}`);
    }

      const isRhythmChangesA = a.family === 'major'
        && b.family === 'dominant'
        && (c.family === 'minor' || c.family === 'half-diminished')
        && d.family === 'dominant'
        && pc(b.rootIdx - a.rootIdx) === 9
        && pc(c.rootIdx - a.rootIdx) === 2
        && pc(d.rootIdx - a.rootIdx) === 7;

      if (isRhythmChangesA) {
      addFinding('Rhythm Changes A', `${a.label} -> ${b.label} -> ${c.label} -> ${d.label}`, `${i + 1}-${i + 4}`);
    }

    // Related ii's: two or more m7 → V7 pairs where each V7 is a perfect 4th above its preceding m7
    // (not resolving down like ii-V-I, but chaining: m7 → V7 → m7 → V7 → ...)
    // This is common in bebop-era reharmonization, where each m7 is the relative minor of the next V7
    const isRelatedIiPairChain4 = (a.family === 'minor' || a.family === 'half-diminished')
      && b.family === 'dominant'
      && (c.family === 'minor' || c.family === 'half-diminished')
      && d.family === 'dominant'
      && pc(b.rootIdx - a.rootIdx) === 5
      && pc(d.rootIdx - c.rootIdx) === 5;
    const isThreeSixTwoFiveTurnaround = isRelatedIiPairChain4 && pc(c.rootIdx - b.rootIdx) === 5;
    if (isThreeSixTwoFiveTurnaround) {
      addFinding('iii-VI-ii-V Turnaround', `turnaround chain: ${a.label} -> ${b.label} -> ${c.label} -> ${d.label}`, `${i + 1}-${i + 4}`);
    } else if (isRelatedIiPairChain4) {
      addFinding('Related ii\'s', `bebop chain: ${a.label} -> ${b.label} -> ${c.label} -> ${d.label}`, `${i + 1}-${i + 4}`);
    }

    // Sequential ii-Vs: two complete ii-V pairs descending by a 5th (common in jazz standards)
    if ((a.family === 'minor' || a.family === 'half-diminished') && b.family === 'dominant' && (c.family === 'minor' || c.family === 'half-diminished') && d.family === 'dominant' && pc(b.rootIdx - a.rootIdx) === 5 && pc(d.rootIdx - c.rootIdx) === 5 && pc(c.rootIdx - a.rootIdx) === 5) {
      addFinding('Sequential ii-Vs', `5th descent: ${a.label} -> ${b.label} -> ${c.label} -> ${d.label}`, `${i + 1}-${i + 4}`);
    }

    // Giant Steps: two major-3rd-apart tonic centers each approached by their dominant V7
    if (a.family === 'major' && b.family === 'dominant' && c.family === 'major' && d.family === 'dominant' && pc(c.rootIdx - b.rootIdx) === 5 && pc(a.rootIdx - c.rootIdx) === 4) {
      addFinding('Giant Steps', `maj-3rd tonic cycle: ${a.label} -> ${b.label} -> ${c.label} -> ${d.label}`, `${i + 1}-${i + 4}`);
    }

    // Modal vamp: same chord quality/root repeated for long stretches (common in So What / Impressions)
    if (a.rootIdx === b.rootIdx && b.rootIdx === c.rootIdx && c.rootIdx === d.rootIdx && a.family === b.family && b.family === c.family && c.family === d.family) {
      addFinding('Modal Vamp', `${a.label} sustains a modal centre`, `${i + 1}-${i + 4}`);
    }

    // Gypsy turnaround: I6 -> VI7 -> ii -> V (or minor ii-V feel) in compact 4-chord cells
    if (!isRhythmChangesA && (a.quality === '6' || a.quality === 'Maj7') && b.family === 'dominant' && (c.family === 'minor' || c.family === 'half-diminished') && d.family === 'dominant' && pc(b.rootIdx - a.rootIdx) === 9 && pc(d.rootIdx - c.rootIdx) === 5) {
      addFinding('Gypsy Turnaround', `${a.label} -> ${b.label} -> ${c.label} -> ${d.label}`, `${i + 1}-${i + 4}`);
    }

    // Direct Modulation: unprepared jump to new key (e.g. I → bVII → I → different I/i)
    if ((a.family === 'major' || a.family === 'minor') && (d.family === 'major' || d.family === 'minor') && a.rootIdx !== d.rootIdx && c.rootIdx === a.rootIdx && c.family === a.family) {
      // a and c are the same tonic, d is a different tonic.
      // If d is still diatonic to a's key center, treat it as local diatonic motion, not abrupt modulation.
      const dIsDiatonicToA = isDiatonicToKey(d.rootIdx, a.rootIdx, a.family);
      const hasCadentialConfirmation = hasCadentialConfirmationNear(i + 3, d.rootIdx, d.family);
      if (!dIsDiatonicToA && hasCadentialConfirmation) {
        addFinding('Direct Modulation', `${a.label} establishes home, then modulates directly to ${d.label}`, `${i + 1}-${i + 4}`);
      }
    }

    // Direct Modulation: dominant pivots to unrelated tonic (doesn't resolve traditionally)
    if (a.family === 'dominant'
      && (d.family === 'major' || d.family === 'minor')
      && pc(a.rootIdx - d.rootIdx) !== 7
      && pc(a.rootIdx - d.rootIdx) !== 2
      && hasCadentialConfirmationNear(i + 3, d.rootIdx, d.family)) {
      addFinding('Direct Modulation', `${a.label} pivots to new key on ${d.label}`, `${i + 1}-${i + 4}`);
    }

    // Extended ii-V-i: approach V7 precedes the iiø, same V7 completes: V7 → iiø → V7 → i
    if (a.family === 'dominant' && (b.family === 'minor' || b.family === 'half-diminished') && c.family === 'dominant' && d.family === 'minor' && a.rootIdx === c.rootIdx && pc(b.rootIdx - d.rootIdx) === 2 && pc(c.rootIdx - d.rootIdx) === 7) {
      const extTonicName = displayNote(d.rootIdx, useFlats);
      addFinding('Extended ii-V-i', `approach dominant into ${extTonicName}: ${a.label} -> ${b.label} -> ${c.label} -> ${d.label}`, `${i + 1}-${i + 4}`);
    }

  }

  for (let i = 0; i < analyzed.length - 4; i++) {
    const a = analyzed[i];
    const b = analyzed[i + 1];
    const c = analyzed[i + 2];
    const d = analyzed[i + 3];
    const e = analyzed[i + 4];

    // Long Turnaround: V7/vi -> vi7 -> ii7 -> V7 -> Imaj7 (all roots rising by 4th / falling by 5th)
    // Example: A7(b9) -> Dm7 -> Gm7 -> C7 -> FMaj7
    if (a.family === 'dominant'
      && b.family === 'minor'
      && (c.family === 'minor' || c.family === 'half-diminished')
      && d.family === 'dominant'
      && e.family === 'major'
      && pc(b.rootIdx - a.rootIdx) === 5
      && pc(c.rootIdx - b.rootIdx) === 5
      && pc(d.rootIdx - c.rootIdx) === 5
      && pc(e.rootIdx - d.rootIdx) === 5
      && pc(c.rootIdx - e.rootIdx) === 2
      && pc(d.rootIdx - e.rootIdx) === 7) {
      addFinding('Long Turnaround', `${a.label} -> ${b.label} -> ${c.label} -> ${d.label} -> ${e.label} (V7/vi -> vi7 -> ii7 -> V7 -> Imaj7)`, `${i + 1}-${i + 5}`);
    }
  }

  for (let i = 0; i < analyzed.length - 5; i++) {
    const a = analyzed[i];
    const b = analyzed[i + 1];
    const c = analyzed[i + 2];
    const d = analyzed[i + 3];
    const e = analyzed[i + 4];
    const f = analyzed[i + 5];

    // Cycling ii-V-i: two complete ii-V-i cadences descending by 5th in minor key context
    if (
      (a.family === 'minor' || a.family === 'half-diminished') && b.family === 'dominant' && c.family === 'minor' &&
      pc(a.rootIdx - c.rootIdx) === 2 && pc(b.rootIdx - c.rootIdx) === 7 &&
      (d.family === 'minor' || d.family === 'half-diminished') && e.family === 'dominant' && f.family === 'minor' &&
      pc(d.rootIdx - f.rootIdx) === 2 && pc(e.rootIdx - f.rootIdx) === 7 &&
      pc(f.rootIdx - c.rootIdx) === 7
    ) {
      const firstTonicName = displayNote(c.rootIdx, useFlats);
      const secondTonicName = displayNote(f.rootIdx, useFlats);
      addFinding('Cycling ii-V-i', `${firstTonicName}→${secondTonicName} minor sequence: ${a.label} -> ${b.label} -> ${c.label} -> ${d.label} -> ${e.label} -> ${f.label}`, `${i + 1}-${i + 6}`);
    }

    // Related ii's (3 pairs): m7 → V7 → m7 → V7 → m7 → V7 bebop reharmonization chain
    const isRelatedIiPairChain6 = (a.family === 'minor' || a.family === 'half-diminished')
      && b.family === 'dominant'
      && (c.family === 'minor' || c.family === 'half-diminished')
      && d.family === 'dominant'
      && (e.family === 'minor' || e.family === 'half-diminished')
      && f.family === 'dominant'
      && pc(b.rootIdx - a.rootIdx) === 5
      && pc(d.rootIdx - c.rootIdx) === 5
      && pc(f.rootIdx - e.rootIdx) === 5;
    const isCycleIIPairs6 = isRelatedIiPairChain6
      && pc(c.rootIdx - b.rootIdx) === 5
      && pc(e.rootIdx - d.rootIdx) === 5;
    if (isCycleIIPairs6) {
      addFinding('Cycle of ii-V Pairs', `cycle chain: ${a.label} -> ${b.label} -> ${c.label} -> ${d.label} -> ${e.label} -> ${f.label}`, `${i + 1}-${i + 6}`);
    } else if (isRelatedIiPairChain6) {
      addFinding('Related ii\'s', `extended bebop chain: ${a.label} -> ${b.label} -> ${c.label} -> ${d.label} -> ${e.label} -> ${f.label}`, `${i + 1}-${i + 6}`);
    }
  }

  for (let i = 0; i < analyzed.length - 7; i++) {
    const a = analyzed[i];
    const b = analyzed[i + 1];
    const c = analyzed[i + 2];
    const d = analyzed[i + 3];
    const e = analyzed[i + 4];
    const f = analyzed[i + 5];
    const g = analyzed[i + 6];
    const h = analyzed[i + 7];

    // Related ii's (4 pairs): m7 → V7 → m7 → V7 → m7 → V7 → m7 → V7 bebop mega-chain
    // Example: Am7 → D7 → Dm7 → G7 → Gm7 → C7 → Cm7 → F7 (→ Bbmaj7 tonic, or continuing further)
    const isRelatedIiPairChain8 = (a.family === 'minor' || a.family === 'half-diminished') && b.family === 'dominant' &&
        (c.family === 'minor' || c.family === 'half-diminished') && d.family === 'dominant' &&
        (e.family === 'minor' || e.family === 'half-diminished') && f.family === 'dominant' &&
        (g.family === 'minor' || g.family === 'half-diminished') && h.family === 'dominant' &&
        pc(b.rootIdx - a.rootIdx) === 5 && pc(d.rootIdx - c.rootIdx) === 5 &&
        pc(f.rootIdx - e.rootIdx) === 5 && pc(h.rootIdx - g.rootIdx) === 5;
    const isCycleIIPairs8 = isRelatedIiPairChain8
      && pc(c.rootIdx - b.rootIdx) === 5
      && pc(e.rootIdx - d.rootIdx) === 5
      && pc(g.rootIdx - f.rootIdx) === 5;
    if (isCycleIIPairs8) {
      addFinding('Cycle of ii-V Pairs', `extended cycle chain: ${a.label} -> ${b.label} -> ${c.label} -> ${d.label} -> ${e.label} -> ${f.label} -> ${g.label} -> ${h.label}`, `${i + 1}-${i + 8}`);
    } else if (isRelatedIiPairChain8) {
      addFinding('Related ii\'s', `bebop mega-chain: ${a.label} -> ${b.label} -> ${c.label} -> ${d.label} -> ${e.label} -> ${f.label} -> ${g.label} -> ${h.label}`, `${i + 1}-${i + 8}`);
    }
  }

  const parseSpanRange = (span) => {
    const m = /^(\d+)(?:-(\d+))?$/.exec(String(span || ''));
    if (!m) return null;
    const start = Number(m[1]);
    const end = Number(m[2] || m[1]);
    if (!Number.isFinite(start) || !Number.isFinite(end)) return null;
    return { start: Math.min(start, end), end: Math.max(start, end) };
  };
  const structuralTypes = new Set([
    'ii-V-I',
    'ii-V-i',
    'Sub-V ii-V-I',
    'Turnaround',
    'iii-VI-ii-V Turnaround',
    'Cycle of ii-V Pairs',
    'Long Turnaround',
    'Extended ii-V-i',
    'Cycling ii-V-i'
  ]);
  const structuralBricks = findings
    .filter(finding => structuralTypes.has(finding.type))
    .map(finding => ({ finding, span: parseSpanRange(finding.span) }))
    .filter(item => !!item.span)
    .sort((a, b) => (a.span.start - b.span.start) || (a.span.end - b.span.end));
  let previousBrick = null;
  structuralBricks.forEach((item) => {
    if (!previousBrick) {
      previousBrick = item;
      return;
    }
    if (item.span.start <= previousBrick.span.end) {
      if (item.span.end > previousBrick.span.end) previousBrick = item;
      return;
    }
    const previousEndChord = analyzed[previousBrick.span.end - 1];
    const nextStartChord = analyzed[item.span.start - 1];
    if (previousEndChord && nextStartChord) {
      const rawInterval = pc(nextStartChord.rootIdx - previousEndChord.rootIdx);
      const signedInterval = rawInterval > 6 ? rawInterval - 12 : rawInterval;
      let joinType = 'Join: Step-Up';
      if (rawInterval === 0) joinType = 'Join: Same-Key';
      else if (rawInterval === 6) joinType = 'Join: Tritone-Jump';
      else if (rawInterval === 5 || rawInterval === 7) joinType = 'Join: Cycle-Forward';
      else if (signedInterval < 0) joinType = 'Join: Step-Down';
      addFinding(joinType, `${previousBrick.finding.type} -> ${item.finding.type}: ${previousEndChord.label} to ${nextStartChord.label}`, `${previousBrick.span.end}-${item.span.start}`);
    }
    previousBrick = item;
  });
  const spansOverlap = (a, b) => {
    const ra = parseSpanRange(a);
    const rb = parseSpanRange(b);
    if (!ra || !rb) return false;
    return ra.start <= rb.end && rb.start <= ra.end;
  };
  const IN_KEY_FUNCTIONAL_TYPES = new Set([
    'ii-V-I',
    'ii-V-i',
    'I-vi-ii-V',
    'Turnaround',
    'Rhythm Changes A',
    'Sub-V ii-V-I'
  ]);
  // DIRECT MODULATION PRUNING FIX: Only remove if exact duplicate, not just overlapping
  const prunedFindings = findings.filter((finding, idx) => {
    if (finding.type !== 'Direct Modulation') return true;
    // Only remove if EXACT SAME span with conflicting type (true duplicate)
    return !findings.some((other, otherIdx) =>
      idx !== otherIdx
      && other.type !== 'Direct Modulation'
      && finding.span === other.span
    );
  });

  return prunedFindings.slice(0, 20);
}

function buildPresetSongData(preset) {
  const changes = Array.isArray(preset?.changes) ? preset.changes : [];
  const isGypsyJazzPreset = /gypsy\s*jazz|minor\s*swing|\bgypsy\b/i.test(String(preset?.name || ''));
  const defaultBeatsPerChord = isGypsyJazzPreset ? 2 : 4;
  const inferredBeats = changes.map(change => (typeof change.beats === 'number' ? change.beats : defaultBeatsPerChord));

  const formsTwoFiveHalfBarPair = (left, right) => {
    const leftRoot = NOTE_TO_INDEX[left?.root];
    const rightRoot = NOTE_TO_INDEX[right?.root];
    if (typeof leftRoot !== 'number' || typeof rightRoot !== 'number') return false;

    const leftQuality = normalizeQuality(left?.quality || '');
    const rightQuality = normalizeQuality(right?.quality || '');
    const leftFamily = chordFamily(leftQuality);
    const rightFamily = chordFamily(rightQuality);

    if (!(leftFamily === 'minor' || leftQuality === 'm7b5')) return false;
    if (rightFamily !== 'dominant') return false;

    // ii -> V root motion (up a fourth / down a fifth)
    return pc(leftRoot + 5) === rightRoot;
  };

  for (let i = 0; i < changes.length - 1; i++) {
    const current = changes[i];
    const next = changes[i + 1];
    const currentHasExplicitBeats = typeof current?.beats === 'number';
    const nextHasExplicitBeats = typeof next?.beats === 'number';

    if (currentHasExplicitBeats || nextHasExplicitBeats) continue;
    if (!formsTwoFiveHalfBarPair(current, next)) continue;

    inferredBeats[i] = 2;
    inferredBeats[i + 1] = 2;
    i += 1;
  }

  const totalSongBars = inferredBeats.reduce((sum, beats) => sum + beats, 0) / 4;

  return {
    chords: changes.map((change, i) => ({
      root: change.root,
      quality: normalizeQuality(change.quality),
      tensions: Array.isArray(change.tensions) ? change.tensions : [],
      selectedScaleName: typeof change.selectedScaleName === 'string' ? change.selectedScaleName : '',
      selectedScaleRootIdx: typeof change.selectedScaleRootIdx === 'number'
        ? change.selectedScaleRootIdx
        : (typeof change.selectedScaleName === 'string' && change.selectedScaleName && typeof NOTE_TO_INDEX[change.root] === 'number'
          ? NOTE_TO_INDEX[change.root]
          : null),
      color: DEFAULT_COLORS[i % DEFAULT_COLORS.length],
      beats: inferredBeats[i],
      skip: false,
      inversion: 0,
      originalRoot: change.root,
      bass: change.root,
      subCycleIndex: 0,
      subBaseRoot: null,
      subBaseQuality: null,
      subBaseTensions: null
    })),
    bpm: preset.bpm,
    numChords: preset.changes.length,
    songLengthBars: totalSongBars,
    metroSubdivision: 'eighth-swing',
    swingPercent: 66,
    accentEvery: 4,
    metroVolume: 0.6,
    anticipationBeats: 1.5,
    noteLenRatio: 0.55
  };
}

// --- 3. Audio Engine ---
class AudioEngine {
  constructor(){ this.ctx=null; this.masterGain=null; this.compressor=null; this.dryGain=null; this.wetGain=null; this.convolver=null; this.activeVoices=new Set(); this.pianoMode='sample'; this.pianoTone='warm'; this.sampleBuffers=new Map(); this.sampleBaseMidis=[36, 48, 60, 72, 84]; }

  setPianoMode(mode) {
    this.pianoMode = 'sample';
    this.pianoTone = mode === 'warmer' ? 'warmer' : 'warm';
    if (this.pianoMode === 'sample' && !this.sampleBuffers.size) {
      this.buildSampleBank();
    }
  }

  buildSampleBank() {
    if (!this.ctx || this.sampleBuffers.size) return;
    const sr = this.ctx.sampleRate;
    const sampleDurationSec = 3.8;
    const length = Math.floor(sr * sampleDurationSec);

    this.sampleBaseMidis.forEach((midi) => {
      const freq = midiToFreq(midi);
      const buffer = this.ctx.createBuffer(1, length, sr);
      const data = buffer.getChannelData(0);

      for (let i = 0; i < length; i++) {
        const t = i / sr;
        const env = Math.exp(-3.1 * t) / (1 + (2.7 * t));
        const strikeEnv = Math.exp(-120 * t);
        const strike = i < Math.floor(sr * 0.02)
          ? (Math.random() * 2 - 1) * 0.05 * strikeEnv
          : 0;

        const body =
          (Math.sin(2 * Math.PI * freq * t) * 0.58) +
          (Math.sin(2 * Math.PI * (freq * 2.0) * t + 0.22) * 0.27 * Math.exp(-0.9 * t)) +
          (Math.sin(2 * Math.PI * (freq * 3.01) * t + 0.47) * 0.16 * Math.exp(-1.6 * t)) +
          (Math.sin(2 * Math.PI * (freq * 4.12) * t + 0.81) * 0.08 * Math.exp(-2.2 * t));

        data[i] = (body + strike) * env;
      }

      this.sampleBuffers.set(midi, buffer);
    });
  }

  playPianoSample(freq, startTime, duration, velocity = 0.5) {
    if (!this.ctx || !this.sampleBuffers.size) return false;

    const targetMidi = Math.round(69 + (12 * Math.log2(freq / 440)));
    const baseMidi = this.sampleBaseMidis.reduce((best, midi) => (
      Math.abs(midi - targetMidi) < Math.abs(best - targetMidi) ? midi : best
    ), this.sampleBaseMidis[0]);
    const sampleBuffer = this.sampleBuffers.get(baseMidi);
    if (!sampleBuffer) return false;

    const noteStart = Math.max(this.ctx.currentTime + 0.001, startTime);
    const source = this.ctx.createBufferSource();
    const filter = this.ctx.createBiquadFilter();
    const airShelf = this.ctx.createBiquadFilter();
    const presenceDip = this.ctx.createBiquadFilter();
    const env = this.ctx.createGain();
    const panner = this.ctx.createStereoPanner();

    source.buffer = sampleBuffer;
    source.playbackRate.setValueAtTime(Math.pow(2, (targetMidi - baseMidi) / 12), noteStart);

    const isWarmer = this.pianoTone === 'warmer';
    if (isWarmer) {
      // Tiny detune jitter adds subtle old-record character.
      source.detune.setValueAtTime((Math.random() - 0.5) * 4.2, noteStart);
    }

    filter.type = 'lowpass';
    filter.frequency.setValueAtTime((isWarmer ? 1320 : 3800) + (velocity * (isWarmer ? 620 : 2200)), noteStart);
    filter.frequency.exponentialRampToValueAtTime((isWarmer ? 460 : 1450) + (velocity * (isWarmer ? 260 : 760)), noteStart + (isWarmer ? 0.72 : 0.34));

    airShelf.connect(presenceDip);

  createReverbImpulse(duration = 2, decay = 2) {
    const sampleRate = this.ctx.sampleRate;
    const length = sampleRate * duration;
    const impulse = this.ctx.createBuffer(2, length, sampleRate);
    for (let channel = 0; channel < 2; channel++) {
      const data = impulse.getChannelData(channel);
      for (let i = 0; i < length; i++) {
        data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / length, decay);
      }
    }
    return impulse;
  }

  makeDistortionCurve(amount = 50) {
    const samples = 44100;
    const curve = new Float32Array(samples);
    const k = typeof amount === 'number' ? amount : 50;
    const deg = Math.PI / 180;
    for (let i = 0; i < samples; i++) {
      const x = (i * 2) / samples - 1;
      curve[i] = ((3 + k) * x * 20 * deg) / (Math.PI + k * Math.abs(x));
    }
    return curve;
  }

    this.masterGain.gain.value = volume;

    this.compressor.connect(this.dryGain);
    this.compressor.connect(this.convolver);
    this.convolver.connect(this.wetGain);
    this.dryGain.connect(this.masterGain);
    this.wetGain.connect(this.masterGain);
    this.masterGain.connect(this.ctx.destination);

    // --- OPTIMIZATION START: PRE-CALCULATE MATH ---

    }

        voice.stopped = true;

    hammerFilter.connect(hammerGain);
    hammerGain.connect(this.compressor);

    const voice = this.registerVoice((when) => {
      const safeWhen = Math.max(this.ctx.currentTime, when);
      const stopWhen = safeWhen + 0.04;
      env.gain.cancelScheduledValues(safeWhen);
      env.gain.setTargetAtTime(0.0001, safeWhen, 0.02);

      try { oscThird.stop(stopWhen); } catch {}
      try { oscFifth.stop(stopWhen); } catch {}
      try { hammerNoise.stop(stopWhen); } catch {}
    });

    oscFund.onended = () => {
      this.activeVoices.delete(voice);
    };

    oscFund.start(noteStart);
    oscThird.start(noteStart);
    oscFifth.start(noteStart);
    hammerNoise.start(noteStart);
    oscFund.stop(noteStart + duration + 1.2);
    oscThird.stop(noteStart + duration + 1.2);
    oscFifth.stop(noteStart + duration + 1.2);
    hammerNoise.stop(noteStart + 0.06);
  }
  playMetronomeClick(startTime, accent=false, volume=1.0) {
    if (!this.ctx || startTime < this.ctx.currentTime) return;
    const duration = 0.06;

    // Soft mellow click: gentle noise + low triangle tone, filtered and softly enveloped.
    const noiseSrc = this.ctx.createBufferSource();
    if (!this.metronomeNoiseBuf) {
      this.metronomeNoiseBuf = this.ctx.createBuffer(1, this.ctx.sampleRate * duration, this.ctx.sampleRate);

    const osc = this.ctx.createOscillator();
    const mixGain = this.ctx.createGain();
    const env = this.ctx.createGain();
    const filter = this.ctx.createBiquadFilter();

    osc.type = 'triangle';
    osc.frequency.setValueAtTime(accent ? 900 : 700, startTime);

    filter.type = 'bandpass';
    filter.frequency.value = accent ? 950 : 750;
    filter.Q.value = 4;

    const gainTarget = volume * (accent ? 0.22 : 0.18);
    env.gain.setValueAtTime(0, startTime);
    env.gain.linearRampToValueAtTime(gainTarget, startTime + 0.004);
    env.gain.exponentialRampToValueAtTime(0.001, startTime + duration);

    noiseSrc.connect(mixGain);
    osc.connect(mixGain);
    mixGain.connect(filter);
    filter.connect(env);
    env.connect(this.compressor);

    const voice = this.registerVoice((when) => {
      const stopAt = Math.max(this.ctx.currentTime, when) + 0.02;
      env.gain.cancelScheduledValues(Math.max(this.ctx.currentTime, when));
      env.gain.setTargetAtTime(0.0001, Math.max(this.ctx.currentTime, when), 0.01);
      try { noiseSrc.stop(stopAt); } catch {}
      try { osc.stop(stopAt); } catch {}
    });

    osc.onended = () => {
      this.activeVoices.delete(voice);
    };

    noiseSrc.start(startTime);
    osc.start(startTime);
    noiseSrc.stop(startTime + duration);
    osc.stop(startTime + duration);
  }
}

function renderMarkdownInline(text, keyPrefix = 'md-inline') {
  return String(text || '')
    .split(/(`[^`]+`)/g)
    .filter(Boolean)
    .map((part, index) => {
      if (part.startsWith('`') && part.endsWith('`')) {
        return (
          <code
            key={`${keyPrefix}-${index}`}
            style={{
              padding: '1px 5px',
              borderRadius: 5,
              border: '1px solid var(--border)',
              background: 'rgba(255,255,255,0.05)',
              fontSize: '0.95em'
            }}
          >
            {part.slice(1, -1)}
          </code>
        );
      }
      return <React.Fragment key={`${keyPrefix}-${index}`}>{part}</React.Fragment>;
    });
}

function renderSimpleMarkdown(text) {
  const lines = String(text || '').replace(/\r\n/g, '\n').split('\n');
  const blocks = [];
  let paragraphLines = [];
  let listItems = [];
  let listType = null;

  const flushParagraph = () => {
    if (!paragraphLines.length) return;
    const textLine = paragraphLines.join(' ');
    blocks.push(
      <p key={`md-p-${blocks.length}`} style={{ margin: '0 0 10px', fontSize: 13, lineHeight: 1.5 }}>
        {renderMarkdownInline(textLine, `md-p-${blocks.length}`)}
      </p>
    );
    paragraphLines = [];
  };

  const flushList = () => {
    if (!listItems.length) return;
    const ListTag = listType === 'ol' ? 'ol' : 'ul';
    blocks.push(
      <ListTag key={`md-list-${blocks.length}`} style={{ margin: '0 0 10px 18px', padding: 0, lineHeight: 1.5 }}>
        {listItems.map((item, index) => (
          <li key={`md-item-${blocks.length}-${index}`} style={{ margin: '0 0 6px' }}>
            {renderMarkdownInline(item, `md-item-${blocks.length}-${index}`)}
          </li>
        ))}
      </ListTag>
    );
    listItems = [];
    listType = null;
  };

  lines.forEach(rawLine => {
    const line = rawLine.trim();

    if (!line) {
      flushParagraph();
      flushList();
      return;
    }

    const headingMatch = line.match(/^(#{1,3})\s+(.*)$/);
    if (headingMatch) {
      flushParagraph();
      flushList();
      const level = Math.min(3, headingMatch[1].length);
      const headingText = headingMatch[2];
      const fontSize = level === 1 ? 18 : level === 2 ? 15 : 13;
      blocks.push(
        <div key={`md-h-${blocks.length}`} style={{ margin: level === 1 ? '0 0 10px' : '10px 0 8px', fontSize, fontWeight: 700, lineHeight: 1.3 }}>
          {renderMarkdownInline(headingText, `md-h-${blocks.length}`)}
        </div>
      );
      return;
    }

    const unorderedMatch = line.match(/^[-*]\s+(.*)$/);
    if (unorderedMatch) {
      flushParagraph();
      if (listType && listType !== 'ul') flushList();
      listType = 'ul';
      listItems.push(unorderedMatch[1]);
      return;
    }

    const orderedMatch = line.match(/^\d+\.\s+(.*)$/);
    if (orderedMatch) {
      flushParagraph();
      if (listType && listType !== 'ol') flushList();
      listType = 'ol';
      listItems.push(orderedMatch[1]);
      return;
    }

    flushList();
    paragraphLines.push(line);
  });

  flushParagraph();
  flushList();
  return blocks;
}

                             </div>

                         const orderedAliases = [

// --- 5. Main App ---
function App(){
  // ===== Song Naming + Category Helpers =====
  const SONG_CATEGORY_SEPARATOR = ' - ';
  const getSongNameParts = (name) => {
    const safeName = String(name || '').trim();
    const idx = safeName.lastIndexOf(SONG_CATEGORY_SEPARATOR);
    if (idx === -1) return { title: safeName, category: '' };
    return {
      title: safeName.slice(0, idx).trim(),
      category: safeName.slice(idx + SONG_CATEGORY_SEPARATOR.length).trim()
    };
  };
  const getSongStyle = (name) => {
    const { category } = getSongNameParts(name);
    return category || 'Custom';
  };
  const hasExplicitSongCategory = (name) => Boolean(getSongNameParts(name).category);
  const buildSongNameWithCategory = (name, category) => {
    const { title, category: embeddedCategory } = getSongNameParts(name);
    const safeTitle = title.trim();
    const explicitCategory = String(category || '').trim();
    const safeCategory = explicitCategory || embeddedCategory;
    if (!safeTitle) return '';
    return safeCategory ? `${safeTitle}${SONG_CATEGORY_SEPARATOR}${safeCategory}` : safeTitle;
  };
  const parseSongTitleKeyHint = (name) => {
    const { title } = getSongNameParts(name);
    const m = /\(([A-G](?:#|b)?)(?:\s*(maj|major|m|min|minor))?\)\s*$/i.exec(String(title || '').trim());
    if (!m) return null;
    const tonicName = m[1];
    const tonic = NOTE_TO_INDEX[tonicName];
    if (!Number.isInteger(tonic)) return null;
    const modeToken = String(m[2] || '').toLowerCase();
    const mode = (modeToken === 'm' || modeToken === 'min' || modeToken === 'minor') ? 'minor' : 'major';
    return {
      tonic,
      mode,
      label: `${tonicName} ${mode}`
    };
  };
  const getNextVersionedSongName = (name) => {
    const { title, category } = getSongNameParts(name);
    const safeTitle = title.trim();
    if (!safeTitle) return '';
    const match = safeTitle.match(/^(.*?)(?:\s+v(\d+))?$/i);
    const baseTitle = (match?.[1] || safeTitle).trim();
    const versionNumber = match?.[2] ? Number(match[2]) + 1 : 2;
    return buildSongNameWithCategory(`${baseTitle} v${versionNumber}`, category);
  };
  const getUniqueVersionedSongName = (name, existingNames = []) => {
    const seed = String(name || '').trim();
    if (!seed) return '';
    const nameSet = new Set(existingNames);
    if (!nameSet.has(seed)) return seed;
    let candidate = getNextVersionedSongName(seed);
    let guard = 0;
    while (nameSet.has(candidate) && guard < 120) {
      candidate = getNextVersionedSongName(candidate);
      guard += 1;
    }
    return candidate;
  };

  // ===== Theme Catalog =====
  const THEME_ORDER = ['light', 'sandstone', 'woody', 'vintage-amp', 'cafe-noir', 'ember-glow', 'dark', 'midnight-jazz', 'lavender-mist', 'smoky-plum', 'rainy-neon', 'neon-burn', 'deep-purple-neon'];
  const THEME_LABELS = {
    light: 'Day',
    dark: 'Night',
    'midnight-jazz': 'Midnight Jazz',
    'cafe-noir': 'Cafe Noir',
    'ember-glow': 'Ember Glow',
    'vintage-amp': 'Vintage Amp',
    'rainy-neon': 'Rainy Neon',
    'neon-burn': 'Neon Burn',
    'smoky-plum': 'Smoky Plum',
    'deep-purple-neon': 'Purple Neon',
    'lavender-mist': 'Lavender Mist',
    sandstone: 'Sandstone',
    woody: 'Woody'
  };
  const THEME_ICONS = {
    light: '◐',
    dark: '◑',
    'midnight-jazz': '◉',
    'cafe-noir': '◍',
    'ember-glow': '◐',
    'vintage-amp': '◩',
    'rainy-neon': '◈',
    'neon-burn': '✶',
    'smoky-plum': '◬',
    'deep-purple-neon': '✧',
    'lavender-mist': '◓',
    sandstone: '◔',
    woody: '◫'
  };

  // ===== Core Song/Library State =====
  const [numChords, setNumChords] = useState(4);
  const [savedSongs, setSavedSongs] = useState(() => {
    const loadedSongs = readSavedSongs();
    const templateFromStorage = loadedSongs[PROTECTED_TEMPLATE_SONG_NAME];
    const mergedSongs = {
      ...BUILT_IN_TWELVE_BAR_SONGS,
      // Keep built-ins available, but never override persisted user songs with the same name.
      ...loadedSongs,
      // Always force latest Scale Study presets so exercise-definition fixes are applied.
      ...SCALE_LEARN_PRESET_SONGS,
      [PROTECTED_TEMPLATE_SONG_NAME]: templateFromStorage && typeof templateFromStorage === 'object'
        ? templateFromStorage
        : NEW_SONG_TEMPLATE_DATA
    };
    return {
      ...mergedSongs
    };
  });
  const [songName, setSongName] = useState('');
  const [selectedLoad, setSelectedLoad] = useState('');
  const [replaceBuiltInTarget, setReplaceBuiltInTarget] = useState('');
  const [showSongLibraryAdvanced, setShowSongLibraryAdvanced] = useState(false);
  const [styleFilter, setStyleFilter] = useState('All');
  const [sortSongsAlphabetically, setSortSongsAlphabetically] = useState(false);
  const [lastLoadedSongName, setLastLoadedSongName] = useState('');
  const [showSongLoadedFlash, setShowSongLoadedFlash] = useState(false);

  // ===== Global UI Click/Key Flash Feedback =====
  useEffect(() => {
    const flashTimers = new WeakMap();
    const flashDurationMs = 450;
    const flashSelector = 'button, .btn, [role="button"]';

    const triggerButtonFlash = (el) => {
      if (!(el instanceof Element)) return;
      if (el.matches(':disabled') || el.getAttribute('aria-disabled') === 'true') return;
      const prevTimer = flashTimers.get(el);
      if (prevTimer) clearTimeout(prevTimer);
      el.classList.remove('btn-click-flash');
      void el.offsetWidth;
      el.classList.add('btn-click-flash');
      const nextTimer = setTimeout(() => {
        el.classList.remove('btn-click-flash');
        flashTimers.delete(el);
      }, flashDurationMs);
      flashTimers.set(el, nextTimer);
    };

    const handleClickFlash = (event) => {
      const target = event.target instanceof Element ? event.target : null;
      const flashTarget = target?.closest?.(flashSelector);
      if (!flashTarget) return;
      triggerButtonFlash(flashTarget);
    };

    const handleKeyboardFlash = (event) => {
      if (event.key !== 'Enter' && event.key !== ' ') return;
      const active = document.activeElement;
      if (!(active instanceof Element)) return;
      const flashTarget = active.closest?.(flashSelector);
      if (!flashTarget) return;
      triggerButtonFlash(flashTarget);
    };

    document.addEventListener('click', handleClickFlash, true);
    document.addEventListener('keydown', handleKeyboardFlash, true);
    return () => {
      document.removeEventListener('click', handleClickFlash, true);
      document.removeEventListener('keydown', handleKeyboardFlash, true);
    };
  }, []);

  // ===== Chord Grid + Playback State =====
  const [activeScale, setActiveScale] = useState(null);
  const DEFAULT_CHORD = (i) => ({ root: 'C', quality: 'Maj7', tensions: [], color: DEFAULT_COLORS[i % 8], beats: 4, skip: false, inversion: 0, originalRoot: 'C', bass: 'C', subCycleIndex: 0, subBaseRoot: null, subBaseQuality: null, subBaseTensions: null, selectedScaleName: '', selectedScaleRootIdx: null });
  const [chords, setChords] = useState(Array(4).fill(null).map((_, i) => DEFAULT_CHORD(i)));
  const enforceAdjacentDuplicatePanelColors = useCallback((inputChords) => {
    if (!Array.isArray(inputChords)) return [];
    const resolved = [];
    for (let i = 0; i < inputChords.length; i++) {
      const safeChord = inputChords[i] || DEFAULT_CHORD(i);
      const baseColor = typeof safeChord.color === 'string' ? safeChord.color : DEFAULT_COLORS[i % DEFAULT_COLORS.length];
      if (i === 0) {
        resolved.push({ ...safeChord, color: baseColor });
        continue;
      }
      const prevInputChord = inputChords[i - 1] || DEFAULT_CHORD(i - 1);
      const prevResolvedChord = resolved[i - 1] || prevInputChord;
      const prevColor = typeof prevResolvedChord.color === 'string' ? prevResolvedChord.color : DEFAULT_COLORS[(i - 1) % DEFAULT_COLORS.length];
      if (String(baseColor).toLowerCase() !== String(prevColor).toLowerCase()) {
        resolved.push({ ...safeChord, color: baseColor });
        continue;
      }
      const paletteIndex = DEFAULT_COLORS.findIndex(c => c.toLowerCase() === String(baseColor).toLowerCase());
      let forcedColor = baseColor;
      for (let step = 1; step <= DEFAULT_COLORS.length; step++) {
        const candidate = DEFAULT_COLORS[((paletteIndex >= 0 ? paletteIndex : 0) + step) % DEFAULT_COLORS.length];
        if (candidate.toLowerCase() !== String(prevColor).toLowerCase()) {
          forcedColor = candidate;
          break;
        }
      }
      resolved.push({ ...safeChord, color: forcedColor });
    }
    return resolved;
  }, []);
  const chordPanelDisplayColors = useMemo(() => {
    const displayColors = [];
    for (let i = 0; i < chords.length; i++) {
      const chord = chords[i] || {};
      const baseColor = typeof chord.color === 'string' ? chord.color : DEFAULT_COLORS[i % DEFAULT_COLORS.length];
      if (i === 0) {
        displayColors.push(baseColor);
        continue;
      }
      const prevDisplayColor = String(displayColors[i - 1] || '').toLowerCase();
      const baseColorLower = String(baseColor).toLowerCase();
      if (baseColorLower !== prevDisplayColor) {
        displayColors.push(baseColor);
        continue;
      }
      const paletteIndex = DEFAULT_COLORS.findIndex(c => c.toLowerCase() === baseColorLower);
      let fallback = baseColor;
      for (let step = 1; step <= DEFAULT_COLORS.length; step++) {
        const candidate = DEFAULT_COLORS[((paletteIndex >= 0 ? paletteIndex : 0) + step) % DEFAULT_COLORS.length];
        if (candidate.toLowerCase() !== prevDisplayColor) {
          fallback = candidate;
          break;
        }
      }
      displayColors.push(fallback);
    }
    return displayColors;
  }, [chords]);
  useEffect(() => {
    const normalized = enforceAdjacentDuplicatePanelColors(chords);
    if (normalized.length !== chords.length) {
      setChords(normalized);
      return;
    }
    const colorsDiffer = normalized.some((chord, i) => {
      const nextColor = typeof chord?.color === 'string' ? chord.color : '';
      const currColor = typeof chords[i]?.color === 'string' ? chords[i].color : '';
      return nextColor.toLowerCase() !== currColor.toLowerCase();
    });
    if (colorsDiffer) setChords(normalized);
  }, [chords, enforceAdjacentDuplicatePanelColors]);
  const [currentIdx, setCurrentIdx] = useState(0);
  const [pendingIdx, setPendingIdx] = useState(null);
  const [isPlaying, setIsPlaying] = useState(false);
  const [bpm, setBpm] = useState(90);
  const [tempoSliderValue, setTempoSliderValue] = useState(90);
  const bpmRef = useRef(90);
  const tempoSliderDragRef = useRef(false);
  const tempoUpdateTimerRef = useRef(null);
  const queuedTempoRef = useRef(null);
  const [volume, setVolume] = useState(0.6);
  const [labelMode, setLabelMode] = useState('degree');
  const [useFlats, setUseFlats] = useState(true);
  const [humanizeMs, setHumanizeMs] = useState(6);
  const [humanizeVel, setHumanizeVel] = useState(10);
  const [humanizeAmount, setHumanizeAmount] = useState(50);
  const [compingPlacement, setCompingPlacement] = useState(0);
  const [reverbAmount, setReverbAmount] = useState(12);
  const [pianoMode, setPianoMode] = useState('warm');
  const [audioError, setAudioError] = useState(null);
  const [noteLenRatio, setNoteLenRatio] = useState(0.55);
  const noteLenRatioRef = useRef(0.55);
  const [anticipationBeats, setAnticipationBeats] = useState(1.5);
  const anticipationBeatsRef = useRef(1.5);
  const [metroVolume, setMetroVolume] = useState(0.6);
  const [accentEvery, setAccentEvery] = useState(4);
  const [metroSubdivision, setMetroSubdivision] = useState("eighth-swing");
  const [swingPercent, setSwingPercent] = useState(66);
  const [stringMask, setStringMask] = useState([false,false,false,false]);
  const [focusStart, setFocusStart] = useState(0);
  const [focusEnd, setFocusEnd] = useState(15);
  const setFocusStartClamped = useCallback((value) => {
    const next = Math.min(KEYBOARD_RANGE_MAX, Math.max(0, Math.floor(Number(value) || 0)));
    setFocusStart(prev => Math.min(next, focusEnd));
  }, [focusEnd]);
  const setFocusEndClamped = useCallback((value) => {
    const next = Math.min(KEYBOARD_RANGE_MAX, Math.max(0, Math.floor(Number(value) || 0)));
    setFocusEnd(prev => Math.max(next, focusStart));
  }, [focusStart]);
  useEffect(() => {

    const bestForRange = (arr) => {

      for (let tonic = 0; tonic < 12; tonic++) {

        if (!span) return null;

          keyLabel: `${displayNote(tonicChord.rootIdx, useFlats)} ${tonicChord.family === 'minor' ? 'minor' : 'major'}`,
          tonic: tonicChord.rootIdx,
          mode: tonicChord.family === 'minor' ? 'minor' : 'major',
          startIndex: span.startIndex,
          endIndex: span.endIndex,
          reason: `${finding.type}: ${finding.detail}`,
          confidenceLabel: 'pattern-anchored',
          confidenceSpread: null,
          confidencePerChord: null,
          sourceType: finding.type,
          isModulation: true
        };
      })
      .filter(Boolean)
      .sort((a, b) => a.startIndex - b.startIndex || (b.endIndex - b.startIndex) - (a.endIndex - a.startIndex));

    const mergedAnchors = [];
    cadenceAnchors.forEach((anchor) => {
      const previous = mergedAnchors[mergedAnchors.length - 1];
      if (previous && previous.keyLabel === anchor.keyLabel && anchor.startIndex <= previous.endIndex + 1) {
        previous.startIndex = Math.min(previous.startIndex, anchor.startIndex);
        previous.endIndex = Math.max(previous.endIndex, anchor.endIndex);

          previous.reason = anchor.reason;
          previous.sourceType = anchor.sourceType;

      }

    let cursor = 0;

        if (leadIn) segments.push(leadIn);

    return segments.reduce((merged, segment) => {

        && next.roman === prev.roman

        if (/half-whole|whole tone|diminished|altered/.test(name)) bonus += 84;
        else if (/locrian/.test(name)) bonus += 36;
      }
      if (
        sourceRoadmapTypeSet.has('ii-V-I')
        || sourceRoadmapTypeSet.has('ii-V-i')
        || sourceRoadmapTypeSet.has('Extended ii-V-i')
        || sourceRoadmapTypeSet.has('Cycling ii-V-i')
      ) {
        if (/dorian|mixolydian|major|locrian #2|bebop/.test(name)) bonus += 56;
      }
      if ((sourceRoadmapTypeSet.has('Related ii\'s') || sourceRoadmapTypeSet.has('Cycle of ii-V Pairs')) && currChordFamily === 'minor') {
        if (/dorian|locrian #2/.test(name)) bonus += 48;
      }
      if (sourceRoadmapTypeSet.has('Modal Interchange') || sourceRoadmapTypeSet.has('Picardy Third')) {
        if (/melodic minor|harmonic minor|nat min|major|lydian/.test(name)) bonus += 48;
      }
      if (sourceFunctionLabel.includes('backdoor') && /lydian dom|mixolydian|blues/.test(name)) bonus += 24;
      if (tags.includes('common')) bonus += 10;

      return bonus;
    };
    let scored = FAM_MODES.map(mode => {
      const scalePCS = scaleSetFromRoot(currObj.rootIdx, mode.intervals);
      let covered = 0, guideCovered = 0;
      unionPCs.forEach(n => { if (scalePCS.has(n)) covered++; });
      currObj.guideTones.forEach(gt => { if (scalePCS.has(gt)) guideCovered++; });
      const coveragePct = covered / (unionPCs.size || 1);
      const guidePct = guideCovered / 2; // Since there are 2 guide tones
      const isMatch = mode.name.toLowerCase().includes((currObj?.quality || "").toLowerCase().slice(0,3));
      // Blues scales deliberately use b3/b5 against the chord — that rub IS the blues sound.
      // Add a bonus on dominant chords so they aren't filtered out for low coverage.
      const bluesBonus = mode.name.includes('Blues') && currChordFamily === 'dominant' ? 200 : 0;
      // Chromatic covers everything — apply damping so it doesn't outrank melodic choices.
      const chromaticDamp = mode.name === 'Chromatic' ? 280 : 0;
      const commonPenaltyNoTension = noTensionContext && !(mode.tags || []).includes('common') ? 180 : 0;
      const bebopPenaltyNoTension = noTensionContext && (mode.tags || []).includes('bebop') ? 120 : 0;
      const bluesPenaltyNoTension = noTensionContext && mode.name.includes('Blues') ? 80 : 0;
      const coverageWeight = noTensionContext ? 1600 : 1000;
      const guideWeight = noTensionContext ? 900 : 500;
      const qualityMatchBonus = noTensionContext ? 60 : 100;
      // At rest: heavily weight harmonic function — scales prescribed by Roman numeral/function label
      // (via scalesForFunction) receive a strong score boost ranked by their theory priority.
      const harmonicFunctionRank = isAtRest ? sourceTheoryScales.indexOf(mode.name) : -1;
      const harmonicFunctionBonus = harmonicFunctionRank === -1 ? 0 : ([500, 350, 200][harmonicFunctionRank] ?? 100);
      // At rest: penalise scales NOT in the theory recommendation if theory data is available.
      // Prevents accidentally high-coverage scales (e.g. Augmented on a plain major triad) from
      // floating to the top of Alternative when better function-matched scales exist.
      const notRecommendedAtRestPenalty = (isAtRest && sourceTheoryScales.length > 0 && harmonicFunctionRank === -1) ? 150 : 0;
      // Augmented scale only belongs on augmented (+) and minor-major (mMaj7) chords.
      // Its intervals happen to include [0,4,7] so it gets spurious 100% coverage on any
      // major triad — exclude it entirely from scoring on inappropriate chord types.
      // At rest: amplify roadmap bonus 3× — progression context (ii-V-I, secondary dominants,
      // modal interchange etc.) should strongly influence scale choice at the resting chord.
      const roadmapBonus = isAtRest ? roadmapScaleBonus(mode) * 3 : roadmapScaleBonus(mode);
      const score = (coveragePct * coverageWeight)
        + (guidePct * guideWeight)
        + (isMatch ? qualityMatchBonus : 0)
        + bluesBonus
        + roadmapBonus
        + harmonicFunctionBonus
        - chromaticDamp
        - commonPenaltyNoTension
        - bebopPenaltyNoTension
        - bluesPenaltyNoTension
        - notRecommendedAtRestPenalty;
      return { ...mode, rootIdx: currObj.rootIdx, score, percent: Math.round(coveragePct * 100), guidePercent: Math.round(guidePct * 100), pcs: scalePCS };
    // Blues scales use a relaxed 40% threshold — b3/b5 blue notes are intentionally outside;
    // don't disqualify them for lower chord-tone coverage.
    // Augmented scale is only appropriate for augmented (+) and minor-major (mMaj7) chords.
    // Its symmetrical structure [0,3,4,7,8,11] contains every major triad, giving it false
    // 100% coverage on plain major chords — exclude it entirely for other chord types.
    }).filter(m => {
      if (m.name === 'Augmented' && currQuality !== '+' && currQuality !== 'mMaj7') return false;
      return m.name.includes('Blues') ? m.percent >= (noTensionContext ? 55 : 40) : m.percent >= relaxedThreshold;
    }).sort((a,b) => b.score - a.score);
    if (!scored.length) return null;

    const keyOf = (item) => `${item.rootIdx}-${item.name}`;
    const takeAvailable = (items, count, blocked = new Set()) => {
      const picked = [];
      const seen = new Set();
      for (const item of items) {
        const key = keyOf(item);
        if (blocked.has(key) || seen.has(key)) continue;
        seen.add(key);
        picked.push(item);
        if (picked.length >= count) break;
      }
      return picked;
    };
    const takeUnique = (items, count) => takeAvailable(items, count, new Set());
    const hasTag = (mode, tag) => Array.isArray(mode.tags) && mode.tags.includes(tag);
    const CATEGORY_NAME_PRIORITY = {
      Best: ['Major', 'Dorian', 'Mixolydian', 'Nat Min.', 'Maj Pent.', 'min Pent.', 'Locrian #2'],
      Alternative: ['Lydian', 'Melodic Minor', 'Lydian Dom.', 'Harmonic Minor', 'Mixolydian b6', 'Phrygian Dom.', 'Whole Tone', 'Dorian b2', 'Half-Whole Dim.', 'Chromatic'],
      Blues: ['Major Blues', 'Minor Blues', 'Composite Blues', 'min Pent.', 'Maj Pent.', 'Dorian', 'Mixolydian', 'Nat Min.', 'Bebop Dominant'],
      Bebop: ['Bebop Dominant', 'Bebop Major', 'Bebop Minor', 'Altered', 'Half-Whole Dim.', 'Melodic Minor', 'Dorian']
    };
    const categoryFocusRules = [
      {
        test: /bebop.*blues|blues.*bebop/i,
        label: 'Bebop',
        names: ['Bebop Dominant', 'Bebop Major', 'Bebop Minor', 'Altered', 'Half-Whole Dim.', 'Melodic Minor', 'Dorian'],
        matcher: (m) => hasTag(m, 'bebop')
      },
      {
        test: /blues/i,
        label: 'Blues Focus',
        names: ['Major Blues', 'Minor Blues', 'Composite Blues', 'min Pent.', 'Maj Pent.', 'Dorian', 'Mixolydian', 'Nat Min.', 'Bebop Dominant'],
        matcher: (m) => hasTag(m, 'bluesy') || ['Mixolydian', 'Dorian', 'Nat Min.'].includes(m.name)
      },
      {
        test: /latin|bossa|samba/i,
        label: 'Latin Focus',
        names: ['Dorian', 'Mixolydian', 'Lydian Dom.', 'Melodic Minor', 'Harmonic Minor', 'Maj Pent.'],
        matcher: (m) => ['Dorian', 'Mixolydian', 'Lydian Dom.', 'Melodic Minor', 'Harmonic Minor', 'Maj Pent.'].includes(m.name)
      },
      {
        test: /ballad/i,
        label: 'Ballad Focus',
        names: ['Major', 'Lydian', 'Dorian', 'Melodic Minor', 'Harmonic Minor', 'Maj Pent.'],
        matcher: (m) => ['Major', 'Lydian', 'Dorian', 'Melodic Minor', 'Harmonic Minor', 'Maj Pent.'].includes(m.name)
      },
      {
        test: /modal/i,
        label: 'Modal Focus',
        names: ['Dorian', 'Lydian', 'Mixolydian', 'Melodic Minor', 'Nat Min.', 'Maj Pent.'],
        matcher: (m) => ['Dorian', 'Lydian', 'Mixolydian', 'Melodic Minor', 'Nat Min.', 'Maj Pent.'].includes(m.name)
      },
      {
        test: /swing|standard|rhythm\s*changes/i,
        label: 'Swing Focus',
        names: ['Major', 'Mixolydian', 'Dorian', 'Bebop Dominant', 'Bebop Major', 'Locrian #2'],
        matcher: (m) => ['Major', 'Mixolydian', 'Dorian', 'Bebop Dominant', 'Bebop Major', 'Locrian #2'].includes(m.name)
      },
      {
        test: /gypsy|minor\s*swing/i,
        label: 'Gypsy Jazz Focus',
        names: ['Hungarian Minor', 'Double Harmonic', 'Harmonic Minor', 'Phrygian Dom.', 'Nat Min.', 'Melodic Minor'],
        matcher: (m) => ['Hungarian Minor', 'Double Harmonic', 'Harmonic Minor', 'Phrygian Dom.', 'Nat Min.', 'Melodic Minor'].includes(m.name)
      },
      {
        test: /bebop/i,
        label: 'Bebop',
        names: CATEGORY_NAME_PRIORITY.Bebop,
        matcher: (m) => hasTag(m, 'bebop')
      }
    ];
    const catWords = (activeSongCategory || '').split(/[\s\-_]+/).filter(w => w.length > 2);
    const matchedCategoryFocus = categoryFocusRules.find(rule => rule.test.test(activeSongCategory || ''))
      || categoryFocusRules.find(rule => catWords.some(w => rule.test.test(w)));
    const dynamicFocusLabel = matchedCategoryFocus?.label || 'Bebop';
    const DYNAMIC_FOCUS_NAME_PRIORITY = matchedCategoryFocus?.names || CATEGORY_NAME_PRIORITY.Bebop;
    const theoryRank = (name) => {
      const index = sourceTheoryScales.indexOf(name);
      return index === -1 ? 99 : index;
    };
    const categoryRank = (category, name) => {
      if (category === dynamicFocusLabel) {
        const focusIndex = DYNAMIC_FOCUS_NAME_PRIORITY.indexOf(name);
        return focusIndex === -1 ? 99 : focusIndex;
      }
      const names = CATEGORY_NAME_PRIORITY[category] || [];
      const index = names.indexOf(name);
      return index === -1 ? 99 : index;
    };
    const sortByChoice = (items, category) => [...items].sort((a, b) => {
      const commonToneDelta = (Number(b.percent) || 0) - (Number(a.percent) || 0);
      if (commonToneDelta !== 0) return commonToneDelta;
      const guideToneDelta = (Number(b.guidePercent) || 0) - (Number(a.guidePercent) || 0);
      if (guideToneDelta !== 0) return guideToneDelta;
      const theoryDelta = theoryRank(a.name) - theoryRank(b.name);
      if (theoryDelta !== 0) return theoryDelta;
      const categoryDelta = categoryRank(category, a.name) - categoryRank(category, b.name);
      if (categoryDelta !== 0) return categoryDelta;
      return b.score - a.score;
    });

    // Best: combine theory-ranked function matches with common-tagged practical scales.
    // This keeps the first column harmonically direct for the current chord/function.
    const theoryBestPool = sortByChoice(
      scored.filter(m => sourceTheoryScales.includes(m.name) && (!noTensionContext || m.percent === 100)),
      'Best'
    );
    const commonPool = sortByChoice(
      scored.filter(m => hasTag(m, 'common') && (!noTensionContext || m.percent === 100)),
      'Best'
    );
    const best = takeUnique([...theoryBestPool, ...commonPool], 4);

    // Deduplicate across all categories so the same scale does not crowd multiple columns.
    const usedKeys = new Set(best.map(keyOf));

    // Alternative: interesting alternatives not already promoted to Best.
    const altPool = sortByChoice(scored.filter(m => !usedKeys.has(keyOf(m)) && !hasTag(m, 'common')), 'Alternative');
    const alternative = takeAvailable(altPool, 4, usedKeys);
    alternative.forEach(m => usedKeys.add(keyOf(m)));

    // Blues: options for blues colour, without duplicating Best/Alternative picks.
    const bluesyPool = sortByChoice(scored.filter(m => hasTag(m, 'bluesy')), 'Blues');
    const bluesy = takeAvailable(bluesyPool, 4, usedKeys);
    bluesy.forEach(m => usedKeys.add(keyOf(m)));

    // Dynamic focus: song-category driven focus, also deduped against prior columns.
    const focusPoolBase = matchedCategoryFocus
      ? scored.filter(m => matchedCategoryFocus.matcher(m))
      : scored.filter(m => hasTag(m, 'bebop'));
    let dynamicFocus = takeAvailable(sortByChoice(focusPoolBase, dynamicFocusLabel), 4, usedKeys);
    if (!dynamicFocus.length && dynamicFocusLabel !== 'Bebop') {
      dynamicFocus = takeAvailable(sortByChoice(scored.filter(m => hasTag(m, 'bebop')), 'Bebop'), 4, usedKeys);
    }

    return [
      { label: 'Best', items: best },
      { label: 'Alternative', items: alternative },
      { label: 'Blues', items: bluesy },
      { label: dynamicFocusLabel, items: dynamicFocus },
    ].filter(group => group?.label === 'Best' || group?.items?.length);
  }, [currentIdx, helperDirection, chordSets, chords, prevChord, theoryProfile, activeSongCategory]);

  const ensureAudio = useCallback(async () => {
    try {
      if (!audioEngineRef.current) {
        audioEngineRef.current = new AudioEngine();
