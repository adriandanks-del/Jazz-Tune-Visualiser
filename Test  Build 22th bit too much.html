        audioEngineRef.current.onStateWarning = (msg) => {
          setAudioError(msg);
          // Stop the sequencer so it doesn't race with a dead audio context.
          setIsPlaying(false);
        };
        await audioEngineRef.current.init(volume);
      }
      await audioEngineRef.current.resume();
      // Ensure current reverb setting is applied when audio starts
      audioEngineRef.current.setReverb(reverbAmount / 100);
      audioEngineRef.current.setPianoMode(pianoMode);
      setAudioError(null);
    } catch (e) {

    }

  const interruptSound = useCallback((clearAnimatedPlayback = true) => {
    audioEngineRef.current?.stopAll(0.012);
    if (!clearAnimatedPlayback) return;
    clearLickTimers();
    setActiveLick(null);
    setActiveLickStepPc(null);
    setActiveStepTrailPc(null);
    setActiveStepTrailVisible(false);

  const buildAutoplayVoicing = useCallback((idx) => {
    const chord = chordSets[idx];
    if (!chord?.pcs?.size) return [];

    const orderedPcs = Array.from(chord.pcs).sort((a, b) => {
      const relA = (a - chord.rootIdx + 12) % 12;
      const relB = (b - chord.rootIdx + 12) % 12;
      return relA - relB || a - b;
    });

    const previousVoicing = Array.isArray(autoPlayVoicingRef.current)
      ? [...autoPlayVoicingRef.current].sort((a, b) => a - b)
      : [];

    if (!previousVoicing.length) {
      const anchorMidi = 48 + chord.rootIdx;
      let lastMidi = anchorMidi - 5;
      return orderedPcs.map((pitchClass) => {
        let candidate = pitchClass + (12 * Math.round((anchorMidi - pitchClass) / 12));
        while (candidate < 43) candidate += 12;
        while (candidate > 72) candidate -= 12;
        while (candidate <= lastMidi + 2) candidate += 12;
        lastMidi = candidate;
        return candidate;
      });
    }

    const averagePreviousMidi = previousVoicing.reduce((sum, midiValue) => sum + midiValue, 0) / previousVoicing.length;
    const denominator = Math.max(1, orderedPcs.length - 1);
    let lastMidi = -Infinity;

    return orderedPcs.map((pitchClass, index) => {
      const mappedIndex = orderedPcs.length === 1
        ? 0
        : Math.round((index * (previousVoicing.length - 1)) / denominator);
      const targetMidi = previousVoicing[mappedIndex] ?? averagePreviousMidi;
      let bestCandidate = null;

      for (let octave = 2; octave <= 7; octave += 1) {
        let candidate = pitchClass + (octave * 12);
        while (candidate <= lastMidi + 2) candidate += 12;
        if (candidate < 40 || candidate > 84) continue;
        const registerPenalty = candidate < 45 || candidate > 76 ? 6 : 0;
        const score = Math.abs(candidate - targetMidi) + (Math.abs(candidate - averagePreviousMidi) * 0.2) + registerPenalty;
        if (!bestCandidate || score < bestCandidate.score) {
          bestCandidate = { midi: candidate, score };
        }
      }

      if (!bestCandidate) {
        let fallbackMidi = pitchClass + 60;
        while (fallbackMidi <= lastMidi + 2) fallbackMidi += 12;
        bestCandidate = { midi: fallbackMidi, score: Number.MAX_SAFE_INTEGER };
      }

      lastMidi = bestCandidate.midi;
      return bestCandidate.midi;
    });
  }, [chordSets]);

  const playChord = useCallback((idx, startTime, options = {}) => {
    if (!audioEngineRef.current || !chordSets[idx]) return;
    const {
      stopExisting = true,
      fadeOutSec = 0.03,
      durationSec = null,
      commonTonePcs = null,
      commonToneVelocityScale = 0.58,
      commonToneHumanizeScale = 0.35,
      voicedMidis = null
    } = options;
    if (stopExisting) {
      audioEngineRef.current.stopAll(fadeOutSec);
    }
    const ctx = audioEngineRef.current.ctx;
    const bpmNow = bpmRef.current;
    const noteLenRatioNow = noteLenRatioRef.current;
    const baseBeat = 60 / bpmNow;
    const dur = typeof durationSec === 'number' ? durationSec : (baseBeat * noteLenRatioNow * (bpmNow < 100 ? 1.4 : 0.8));
    const chordStart = typeof startTime === 'number' ? startTime : (ctx.currentTime + 0.01);
    const leadSec = getCompingLeadSec(bpmNow, metroSubdivision, swingPercent, compingPlacement);
    const minStart = ctx.currentTime + 0.001;

    noteMidis.forEach((midiValue, i) => {
      const notePc = pc(midiValue);
      const isCommonTone = commonTonePcs instanceof Set && commonTonePcs.has(notePc);
      const humanizeScale = isCommonTone ? commonToneHumanizeScale : 1;
      const humanizeSec = ((Math.random() - 0.5) * (humanizeMs / 1000)) * humanizeScale;
      const when = Math.max(minStart, chordStart - leadSec + humanizeSec + (i * 0.01));
      const velocityBase = 0.4 + (Math.random()*(humanizeVel/100));
      const velocity = isCommonTone ? velocityBase * commonToneVelocityScale : velocityBase;
      audioEngineRef.current.playPianoNote(midiToFreq(midiValue), when, dur, velocity);
    });
  }, [chordSets, chords, humanizeMs, humanizeVel, metroSubdivision, swingPercent, compingPlacement]);

  const playChordFromChords = useCallback((idx, chordState, startTime, options = {}) => {
    if (!audioEngineRef.current || !chordState[idx]) return;

    if (stopExisting) {
      audioEngineRef.current.stopAll(fadeOutSec);
    }
    const ctx = audioEngineRef.current.ctx;
    const bpmNow = bpmRef.current;
    const noteLenRatioNow = noteLenRatioRef.current;
    const baseBeat = 60 / bpmNow;
    const dur = typeof durationSec === 'number' ? durationSec : (baseBeat * noteLenRatioNow * (bpmNow < 100 ? 1.4 : 0.8));
    const chordStart = typeof startTime === 'number' ? startTime : (ctx.currentTime + 0.01);
    const leadSec = getCompingLeadSec(bpmNow, metroSubdivision, swingPercent, compingPlacement);
    const minStart = ctx.currentTime + 0.001;
    const editedChord = chordState[idx];
    const pcs = computeChordPitchClasses(editedChord.root, editedChord.quality, editedChord.tensions || []);
    const midis = buildInversionVoicedMidis(editedChord, pcs);
    midis.forEach((midiValue, i) => {
      const humanizeSec = (Math.random() - 0.5) * (humanizeMs / 1000);
      const when = Math.max(minStart, chordStart - leadSec + humanizeSec + (i * 0.01));

  const selectChord = useCallback(async (idx) => {

    stopPlaybackTransport();
    setManualCurrentChord(idx);
    setActiveLickStepPc(null);
    setActiveStepTrailPc(null);
    setActiveStepTrailVisible(false);
    setLeadSheetFlashState(prev => ({ index: idx, tick: prev.tick + 1 }));
    // Play the chord then stop

  }, [chordIsolationIdx, ensureAudio, playChord, practiceWindowSizeBars, validWindowChordIndices, stopPlaybackTransport, setManualCurrentChord]);

  const previewEditedChord = useCallback(async (idx, chordState) => {
    if (isPlaying) return;
    await ensureAudio();
    if (chordState) {

    playChord(idx);
  }, [isPlaying, ensureAudio, playChord, playChordFromChords]);

  // Applies a chord change if compatible with any saved scale on that chord;

  const tryApplyChordChange = useCallback((chordIdx, nextChords) => {

    if (savedScaleName) {
      const mode = FAM_MODES.find(m => m.name === savedScaleName);
      if (mode) {
        const rootIdx = Number.isInteger(savedScaleRootIdx)
          ? savedScaleRootIdx
          : (NOTE_TO_INDEX[original?.root] ?? 0);

        const newChord = nextChords[chordIdx];
        const chordPcs = computeChordPitchClasses(newChord.root, newChord.quality, newChord.tensions || []);
        const [gt3, gt7] = getGuideTones(NOTE_TO_INDEX[newChord.root] ?? 0, newChord.quality);
        const hasIncompatibleChordTone = Array.from(chordPcs).some(pcValue => !scalePcs.has(pcValue));
        if (!scalePcs.has(gt3) || !scalePcs.has(gt7) || hasIncompatibleChordTone) {

    }
    setChords(nextChords);
    void previewEditedChord(chordIdx, nextChords);

  const buildTheoryReorderPlan = useCallback((fromStart, fromEnd, targetStart) => {
    if (![fromStart, fromEnd, targetStart].every(Number.isInteger)) return null;
    if (!chords.length) return null;

    const safeFromStart = Math.max(0, Math.min(chords.length - 1, fromStart));
    const safeFromEnd = Math.max(safeFromStart, Math.min(chords.length - 1, fromEnd));
    const safeTargetStart = Math.max(0, Math.min(chords.length, targetStart));

    if (safeTargetStart >= safeFromStart && safeTargetStart <= safeFromEnd + 1) return null;

    const order = Array.from({ length: chords.length }, (_, i) => i);
    const moved = order.slice(safeFromStart, safeFromEnd + 1);
    const remaining = order.filter(i => i < safeFromStart || i > safeFromEnd);
    const insertionIndex = safeTargetStart > safeFromEnd ? safeTargetStart - moved.length : safeTargetStart;
    const nextOrder = [
      ...remaining.slice(0, insertionIndex),
      ...moved,
      ...remaining.slice(insertionIndex)
    ];
    const updated = nextOrder.map(i => chords[i]);
    const nextCurrentIdx = Math.max(0, nextOrder.indexOf(currentIdx));

    return {
      fromStart: safeFromStart,
      fromEnd: safeFromEnd,
      targetStart: safeTargetStart,
      updated,
      nextCurrentIdx,
      movedLabels: chords.slice(safeFromStart, safeFromEnd + 1).map(getChordDisplayText),
      previewLabels: updated.map(getChordDisplayText)
    };
  }, [chords, currentIdx]);

  const reorderTheorySpan = useCallback((fromStart, fromEnd, targetStart) => {

  const buildChordDeletePlan = useCallback((chordIndex) => {

    const updated = chords.length > 1
      ? chords.filter((_, idx) => idx !== chordIndex)
      : [DEFAULT_CHORD(0)];
    const nextCurrentIdx = chords.length > 1
      ? (currentIdx === chordIndex ? Math.min(chordIndex, updated.length - 1) : (currentIdx > chordIndex ? currentIdx - 1 : currentIdx))
      : 0;

    return {
      mode: 'delete',
      fromStart: chordIndex,
      fromEnd: chordIndex,
      targetStart: -1,
      updated,
      nextCurrentIdx,

      previewLabels: updated.map(getChordDisplayText)
    };
  }, [chords, currentIdx]);

  const applyPendingChordPlan = useCallback((plan) => {
    if (!plan || !Array.isArray(plan.updated) || !Number.isInteger(plan.nextCurrentIdx)) return;
    setManualCurrentChord(plan.nextCurrentIdx);
    setRoadmapModalGroup(null);
    setDragOverTheorySpan(null);
    setDraggedTheorySpanKey(null);

        warnings.push(`numChords (${song.numChords}) does not match chords length (${song.chords.length}).`);

      const bpmValue = Number(song.bpm);
      if (!Number.isFinite(bpmValue) || bpmValue < 30 || bpmValue > 320) {
        warnings.push(`BPM value "${song.bpm}" is outside the usual range.`);

    const invalid = [];

    entries.forEach(([name, song]) => {

    if (!invalid.length) {

    }

    const preview = invalid
      .slice(0, 8)
      .map(item => `- ${item.name}: ${item.issues[0]}`)
      .join('\n');
    const remainder = invalid.length > 8 ? `\n...and ${invalid.length - 8} more.` : '';

    const payload = {
      format: 'jazz-song-backup-v1',
      exportedAt: new Date().toISOString(),
      songCount,
      songs: exportableSongs
    };
    const dateStamp = new Date().toISOString().slice(0, 10);
    const fileName = `jazz-song-backup-${dateStamp}.json`;
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const anchor = document.createElement('a');
    anchor.href = url;
    anchor.download = fileName;
    document.body.appendChild(anchor);
    anchor.click();
    anchor.remove();
    URL.revokeObjectURL(url);
  }

  function handleImportSavedSongsBackup(event) {
    const input = event?.target;
    const file = input?.files?.[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = () => {
      try {
        const parsed = JSON.parse(String(reader.result || '{}'));
        const importedSource = parsed && typeof parsed === 'object' && !Array.isArray(parsed)
          ? (parsed.songs && typeof parsed.songs === 'object' && !Array.isArray(parsed.songs) ? parsed.songs : parsed)
          : null;
        if (!importedSource) {
          alert('Invalid backup file format.');
          return;
        }

        const importedEntries = Object.entries(importedSource).filter(([name, song]) => (
          typeof name === 'string'
          && !!name.trim()
          && !isProtectedTemplateSongName(name)
          && song
          && typeof song === 'object'
          && !Array.isArray(song)
        ));

        if (!importedEntries.length) {
          alert('No valid songs found in this backup file.');
          return;
        }

        const nextSongs = { ...savedSongs };
        let importedCount = 0;
        let skippedCount = 0;
        let skippedInvalidCount = 0;
        const invalidPreview = [];
        importedEntries.forEach(([name, song]) => {
          if (isProtectedTemplateSongName(name)) {
            skippedCount += 1;
            return;
          }

          const validation = validateSongObject(name, song);
          if (!validation.valid) {
            skippedInvalidCount += 1;
            if (invalidPreview.length < 5) {
              invalidPreview.push(`${name}: ${validation.issues[0]}`);
            }
            return;
          }

          nextSongs[name] = getExportableSavedSongsMap({ [name]: song })[name] || song;
          importedCount += 1;
        });

        setSavedSongs(nextSongs);
        writeSavedSongs(nextSongs);
        const skippedBits = [
          skippedCount ? `${skippedCount} protected skipped` : '',
          skippedInvalidCount ? `${skippedInvalidCount} invalid skipped` : ''
        ].filter(Boolean).join(', ');
        const invalidDetail = invalidPreview.length ? `\n\nInvalid examples:\n${invalidPreview.map(x => `- ${x}`).join('\n')}` : '';
        alert(`Imported ${importedCount} song${importedCount === 1 ? '' : 's'}${skippedBits ? ` (${skippedBits})` : ''}.${invalidDetail}`);
      } catch {
        alert('Could not read backup file. Please choose a valid JSON export.');
      } finally {
        if (input) input.value = '';
      }
    };
    reader.onerror = () => {
      alert('Could not read backup file.');
      if (input) input.value = '';
    };
    reader.readAsText(file);
  }

  const cycleTheme = () => {
    setThemeMode(prev => THEME_ORDER[(THEME_ORDER.indexOf(prev) + 1) % THEME_ORDER.length]);
  };

  const toggleFullscreen = () => {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen();
    } else {
      document.exitFullscreen();
    }
  };

  return (
    <div className="container">
      <div className="app-shell">
      {audioError && (
        <div className="audio-error-banner" role="alert">
          <span>⚠ {audioError}</span>
          <button onClick={() => setAudioError(null)} title="Dismiss">✕</button>
        </div>
      )}
      {barDurationWarning && (
        <div className="warning-banner" role="status">
          <span>⚠ {barDurationWarning}</span>
          <button onClick={() => setBarDurationWarning('')} title="Dismiss">✕</button>
        </div>
      )}
      {Number.isInteger(chordScaleConflict) && (
        <div className="warning-modal-overlay" role="dialog" aria-modal="true" aria-label="Chord scale conflict">
          <div className="warning-modal">
            <h3>Changes incompatible with current saved scale!</h3>
            <p>The new chord root or quality conflicts with the guide tones of the saved scale. The change has been cancelled.</p>
            <div className="warning-modal-actions">
              <button className="btn" onClick={() => setChordScaleConflict(null)}>Cancel</button>
              <button className="btn primary" onClick={() => {
                const conflictIdx = chordScaleConflict;
                setChordScaleConflict(null);
                setChords(prev => prev.map((c, j) => (
                  j === conflictIdx
                    ? { ...c, selectedScaleName: '', selectedScaleRootIdx: null }
                    : c
                )));
                setActiveOptionView('scales-licks');
              }}>Go to Scales/Licks</button>
            </div>
          </div>
        </div>
      )}
      {overflowPrompt && (
        <div className="warning-modal-overlay" role="dialog" aria-modal="true" aria-label="Bar overflow options">
          <div className="warning-modal">
            {overflowPrompt.source === 'tempo-reduce' ? (
              <>
                <h3>Bar Limit Reached</h3>
                <p>
                  The song currently uses {Number.isInteger(overflowPrompt.currentBars) ? overflowPrompt.currentBars : overflowPrompt.currentBars.toFixed(1)} bars,
                  but you reduced the song length to {overflowPrompt.requestedBarTarget} bars.
                </p>
                <div className="warning-modal-actions">
                  <button className="btn" onClick={() => setOverflowPrompt(null)}>Cancel</button>
                  <button
                    className="btn primary"
                    onClick={() => {
                      const targetBeats = overflowPrompt.requestedBarTarget * 4;
                      let remaining = targetBeats;
                      const trimmed = [];

                      for (let i = 0; i < chords.length && remaining > 0; i += 1) {
                        const chord = chords[i];
                        const chordBeats = normalizeBeatsValue(chord?.beats, 4);
                        const maxAllowed = Math.min(chordBeats, remaining);
                        const fitted = DURATION_BEAT_OPTIONS.filter(v => v <= maxAllowed).pop()
                          || DURATION_BEAT_OPTIONS.filter(v => v <= remaining).pop();
                        if (!fitted) break;

                        trimmed.push({
                          ...chord,
                          beats: fitted,
                          tensions: Array.isArray(chord?.tensions) ? [...chord.tensions] : []
                        });
                        remaining -= fitted;
                      }

                      if (!trimmed.length) {
                        const fallbackBeats = DURATION_BEAT_OPTIONS.filter(v => v <= targetBeats).pop() || DURATION_BEAT_OPTIONS[0];
                        trimmed.push({ ...DEFAULT_CHORD(0), beats: fallbackBeats });
                      }

                      setChords(trimmed);
                      setNumChords(trimmed.length);
                      setSongBarTarget(overflowPrompt.requestedBarTarget);
                      const removedCount = Math.max(0, chords.length - trimmed.length);
                      setBarDurationWarning(`Song reduced to ${overflowPrompt.requestedBarTarget} bars.${removedCount ? ` Removed ${removedCount} chord${removedCount === 1 ? '' : 's'}.` : ''}`);
                      setOverflowPrompt(null);
                    }}
                  >
                    Trim Chords to Fit
                  </button>
                </div>
                <div className="warning-modal-note">Trim chord durations to fit within the new bar limit.</div>
              </>
            ) : overflowPrompt.source === 'tempo-expand' ? (
              <>
                <h3>Add Chords To Fill Song Length?</h3>
                <p>
                  The song currently uses {Number.isInteger(overflowPrompt.currentBars) ? overflowPrompt.currentBars : overflowPrompt.currentBars.toFixed(1)} bars,
                  and you increased the song length to {overflowPrompt.requestedBarTarget} bars.
                </p>
                <div className="warning-modal-actions">
                  <button className="btn" onClick={() => setOverflowPrompt(null)}>Cancel</button>
                  <button
                    className="btn primary"
                    onClick={() => {
                      const targetBeats = overflowPrompt.requestedBarTarget * 4;
                      const baseSequence = chords.length ? chords : [DEFAULT_CHORD(0)];
                      const nextChords = chords.map(ch => ({ ...ch, tensions: Array.isArray(ch.tensions) ? [...ch.tensions] : [] }));
                      let currentBeats = nextChords.reduce((sum, chord) => sum + normalizeBeatsValue(chord?.beats, 4), 0);
                      let sourceIndex = 0;

                      while (currentBeats < targetBeats && sourceIndex < 512) {
                        const template = baseSequence[sourceIndex % baseSequence.length] || DEFAULT_CHORD(sourceIndex);
                        const remainingBeats = targetBeats - currentBeats;
                        const templateBeats = normalizeBeatsValue(template?.beats, 4);
                        const maxAllowed = Math.min(templateBeats, remainingBeats);
                        const fittedBeats = DURATION_BEAT_OPTIONS.filter(v => v <= maxAllowed).pop()
                          || DURATION_BEAT_OPTIONS.filter(v => v <= remainingBeats).pop()
                          || DURATION_BEAT_OPTIONS[0];

                        nextChords.push({
                          ...template,
                          beats: fittedBeats,
                          tensions: Array.isArray(template.tensions) ? [...template.tensions] : []
                        });
                        currentBeats += fittedBeats;
                        sourceIndex += 1;
                      }

                      setChords(nextChords);
                      setNumChords(nextChords.length);
                      setSongBarTarget(overflowPrompt.requestedBarTarget);
                      const addedCount = Math.max(0, nextChords.length - chords.length);
                      setBarDurationWarning(`Added ${addedCount} chord${addedCount === 1 ? '' : 's'} from the start of the song to fill ${overflowPrompt.requestedBarTarget} bars.`);
                      setOverflowPrompt(null);
                    }}
                  >
                    Add Chords From The Beginning Of The Song
                  </button>
                </div>
                <div className="warning-modal-note">This appends chords in the current progression order until the selected bar count is filled.</div>
              </>
            ) : (
              <>
                <h3>Bar Limit Reached</h3>
                <p>
                  Chord {overflowPrompt.chordIndex + 1} requested {overflowPrompt.requestedBars} bars,
                  but only {overflowPrompt.maxBars} bars remain with a target of {overflowPrompt.targetBars} bars.
                </p>
                <div className="warning-modal-actions">
                  <button className="btn" onClick={() => setOverflowPrompt(null)}>Cancel</button>
                  <button
                    className="btn"
                    onClick={() => {
                      const fittedBeats = DURATION_BEAT_OPTIONS.filter(v => v <= overflowPrompt.maxBeats).pop() || DURATION_BEAT_OPTIONS[0];
                      setChords(prev => prev.map((c, j) => j === overflowPrompt.chordIndex ? { ...c, beats: fittedBeats } : c));
                      setBarDurationWarning(`Chord ${overflowPrompt.chordIndex + 1} fitted to ${fittedBeats / 4} bars.`);
                      setOverflowPrompt(null);
                    }}
                  >
                    Fit Remaining Bars
                  </button>
                  <button
                    className="btn primary"
                    disabled={!overflowPrompt.nextTargetBars}
                    onClick={() => {
                      if (!overflowPrompt.nextTargetBars) {
                        setBarDurationWarning('Cannot increase beyond 32 bars.');
                        setOverflowPrompt(null);
                        return;
                      }
                      setSongBarTarget(overflowPrompt.nextTargetBars);
                      setChords(prev => prev.map((c, j) => j === overflowPrompt.chordIndex ? { ...c, beats: overflowPrompt.requestedBeats } : c));
                      setBarDurationWarning(`Song duration increased to ${overflowPrompt.nextTargetBars} bars.`);
                      setOverflowPrompt(null);
                    }}
                  >
                    {overflowPrompt.nextTargetBars
                      ? `Increase Song Duration To ${overflowPrompt.nextTargetBars} Bars`
                      : 'Increase Song Duration (Unavailable)'}
                  </button>
                </div>
                <div className="warning-modal-note">Choose how you want to handle this overflow.</div>
              </>
            )}
          </div>
        </div>
      )}
      {saveDialogMode && (
        <div className="warning-modal-overlay" role="dialog" aria-modal="true" aria-label="Save song dialog">
          <div className="warning-modal">
            <h3>{saveDialogMode === 'save' ? 'Save Song' : 'Save Song As'}</h3>
            <p>{saveDialogMode === 'save' ? 'Save changes to the current song?' : 'Choose the song name for this chart.'}</p>
            <input
              type="text"
              value={saveDialogName}
              onChange={e => {
                const nextName = e.target.value;
                setSaveDialogName(nextName);
              }}
              list="save-dialog-song-suggestions"
              placeholder="Song name…"
              autoFocus
              style={{ width: '100%', marginTop: 10 }}
            />
            <datalist id="save-dialog-song-suggestions">
              {saveDialogNameSuggestions.map(name => <option key={name} value={name} />)}
            </datalist>
            {saveDialogMode === 'save-as' ? (
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: 8, marginTop: 8, flexWrap: 'wrap' }}>
                <span style={{ fontSize: 12, fontWeight: 600, opacity: 0.96, color: 'var(--text)' }}>
                  Detected chart key: <strong>{getDetectedSaveKeyToken() || 'unknown'}</strong>
                </span>
                <div style={{ display: 'flex', gap: 6, alignItems: 'center', flexWrap: 'wrap' }}>
                  <button
                    className="btn"
                    onClick={() => {
                      const baseName = saveDialogName.trim() || lastLoadedSongName.trim() || selectedLoad.trim() || songName.trim();
                      if (!baseName) return;
                      const variants = getDetectedSaveKeyVariants();
                      setSaveDialogName(applyDetectedKeyToSongName(baseName, variants.detected || getDetectedSaveKeyToken()));
                    }}
                    title="Update the title to use the detected chart key"
                  >
                    Use Detected Key
                  </button>
                  <button
                    className="btn"
                    onClick={() => {
                      const baseName = saveDialogName.trim() || lastLoadedSongName.trim() || selectedLoad.trim() || songName.trim();
                      if (!baseName) return;
                      const variants = getDetectedSaveKeyVariants();
                      if (!variants.major) return;
                      setSaveDialogName(applyDetectedKeyToSongName(baseName, variants.major));
                    }}
                    title="Force a major key token in the title"
                    disabled={!getDetectedSaveKeyVariants().major}
                  >
                    Use Major
                  </button>
                  <button
                    className="btn"
                    onClick={() => {
                      const baseName = saveDialogName.trim() || lastLoadedSongName.trim() || selectedLoad.trim() || songName.trim();
                      if (!baseName) return;
                      const variants = getDetectedSaveKeyVariants();
                      if (!variants.minor) return;
                      setSaveDialogName(applyDetectedKeyToSongName(baseName, variants.minor));
                    }}
                    title="Force a minor key token in the title"
                    disabled={!getDetectedSaveKeyVariants().minor}
                  >
                    Use Minor
                  </button>
                </div>
              </div>
            ) : null}
            {saveDialogMode === 'save-as' && (
              <>
                <p style={{ marginTop: 8 }}>Pick a category for this save.</p>
                <select
                  value={saveDialogCategory}
                  onChange={e => {
                    const value = e.target.value;
                    setSaveDialogCategory(value);
                    if (value !== NEW_SAVE_CATEGORY_VALUE) setSaveDialogNewCategory('');
                  }}
                  style={{ width: '100%', marginTop: 8 }}
                >
                  <option value="">Choose category…</option>
                  {saveDialogCategoryOptions.map(category => <option key={category} value={category}>{category}</option>)}
                  <option value={NEW_SAVE_CATEGORY_VALUE}>New Category</option>
                </select>
                {saveDialogCategory === NEW_SAVE_CATEGORY_VALUE ? (
                  <input
                    type="text"
                    value={saveDialogNewCategory}
                    onChange={e => setSaveDialogNewCategory(e.target.value)}
                    placeholder="Enter new category…"
                    style={{ width: '100%', marginTop: 8 }}
                  />
                ) : null}
              </>
            )}
            <label className="row" style={{ gap: 8, marginTop: 8, cursor: 'pointer' }}>
              <input
                type="checkbox"
                checked={saveDialogChecked}
                onChange={e => setSaveDialogChecked(e.target.checked)}
              />
              <span>{saveDialogMode === 'save' ? 'Overwrite the current saved song.' : 'Create or overwrite this saved song name.'}</span>
            </label>
            <div className="warning-modal-actions" style={{ justifyContent: 'flex-end' }}>
              <button className="btn" onClick={closeSaveDialog}>Cancel</button>
              <button className="btn primary" disabled={!saveDialogChecked || !saveDialogName.trim() || (saveDialogMode === 'save-as' && !(saveDialogCategory === NEW_SAVE_CATEGORY_VALUE ? saveDialogNewCategory.trim() : (saveDialogCategory || '').trim()))} onClick={confirmSaveDialog}>{saveDialogMode === 'save' ? 'Save' : 'Save As'}</button>
            </div>
          </div>
        </div>
      )}
      {pendingSongDeleteName ? (
        <div className="warning-modal-overlay" role="dialog" aria-modal="true" aria-label="Delete song confirmation">
          <div className="warning-modal">
            <h3>Delete Song?</h3>
            <p>Delete "{pendingSongDeleteName}" from saved songs?</p>
            <div className="warning-modal-actions" style={{ justifyContent: 'flex-end' }}>
              <button className="btn" onClick={() => setPendingSongDeleteName('')}>Cancel</button>
              <button
                className="btn primary"
                onClick={() => {
                  deleteSong(pendingSongDeleteName);
                  if (selectedLoad === pendingSongDeleteName) setSelectedLoad('');
                  setPendingSongDeleteName('');
                }}
              >
                Delete
              </button>
            </div>
          </div>
        </div>
      ) : null}
      {pendingBuiltInReplaceName ? (
        <div className="warning-modal-overlay" role="dialog" aria-modal="true" aria-label="Replace built-in song confirmation">
          <div className="warning-modal">
            <h3>Replace Built-In Song?</h3>
            <p>Replace the built-in chart "{pendingBuiltInReplaceName}" with the current chart?</p>
            <div className="warning-modal-note">Source chart: {lastLoadedSongName || songName || 'Current unsaved chart'}.</div>
            <div className="warning-modal-note">This creates/updates an additional copy under the built-in song name so it loads instead of the stock version. Your existing saved song name is not renamed or deleted.</div>
            <div className="warning-modal-actions" style={{ justifyContent: 'flex-end' }}>
              <button className="btn" onClick={() => setPendingBuiltInReplaceName('')}>Cancel</button>
              <button
                className="btn primary"
                onClick={() => {
                  const didReplace = replaceBuiltInSong(pendingBuiltInReplaceName);
                  if (didReplace) setReplaceBuiltInTarget('');
                  setPendingBuiltInReplaceName('');
                }}
              >
                Create Override Copy
              </button>
            </div>
          </div>
        </div>
      ) : null}
      {pendingLearnScalesMode ? (
        <div className="warning-modal-overlay" role="dialog" aria-modal="true" aria-label="Enter Learn Scales confirmation">
          <div className="warning-modal">
            <h3>Enter Learn Scales?</h3>
            <p>Switching to Learn Scales loads a dedicated scale exercise and stops the current song playback.</p>
            <div className="warning-modal-note">Your current chart can be saved first.</div>
            <div className="warning-modal-actions" style={{ justifyContent: 'flex-end', flexWrap: 'wrap', gap: 6 }}>
              <button className="btn" onClick={() => setPendingLearnScalesMode(false)}>Cancel</button>
              <button
                className="btn"
                onClick={() => {
                  setPendingLearnScalesMode(false);
                  enterLearnScalesMode();
                }}
              >
                Continue Without Saving
              </button>
              <button className="btn" onClick={() => requestSaveThenEnterLearnScales('save-as')}>Save New & Continue</button>
              <button
                className="btn primary"
                onClick={() => requestSaveThenEnterLearnScales('save')}
                disabled={!(lastLoadedSongName.trim() || selectedLoad.trim()) || isProtectedTemplateSongName(lastLoadedSongName.trim() || selectedLoad.trim())}
                title="Save over the currently loaded song, then enter Learn Scales"
              >
                Save Current & Continue
              </button>
            </div>
          </div>
        </div>
      ) : null}
      {pendingTheoryReorder && (
        <div className="warning-modal-overlay" role="dialog" aria-modal="true" aria-label="Confirm chord reorder">
          <div className="warning-modal">
            <h3>{pendingTheoryReorder.mode === 'delete' ? 'Confirm Chord Delete' : 'Confirm Chord Reorder'}</h3>
            <p>{pendingTheoryReorder.mode === 'delete' ? `Delete ${pendingTheoryReorder.movedLabels.join(' → ')}?` : `Move ${pendingTheoryReorder.movedLabels.join(' → ')}?`}</p>
            <p style={{ marginTop: 8 }}><strong>New order:</strong></p>
            <div className="tiny" style={{ marginTop: 6, lineHeight: 1.5 }}>
              {pendingTheoryReorder.previewLabels.map((label, index) => (
                <span key={`${label}-${index}`}>
                  {index ? ' → ' : ''}{label}
                </span>
              ))}
            </div>
            <div className="warning-modal-actions" style={{ justifyContent: 'flex-end' }}>
              <button className="btn" onClick={() => { setPendingTheoryReorder(null); setDragOverTheorySpan(null); setDraggedTheorySpanKey(null); setDraggedChordIndex(null); setDragOverChordDrop(null); }}>Cancel</button>
              <button className="btn primary" onClick={confirmPendingTheoryReorder}>Confirm</button>
            </div>
          </div>
        </div>
      )}
      {introHelpModalOpen ? (
        <div className="warning-modal-overlay" role="dialog" aria-modal="true" aria-label="Jazz Tune Visualiser intro">
          <div className="warning-modal">
            <h3>Jazz Tune Visualiser</h3>
            <div style={{ marginTop: 8, maxHeight: '56vh', overflowY: 'auto', border: '1px solid var(--border)', borderRadius: 8, padding: '10px 12px' }}>
              {renderSimpleMarkdown(introHelpDefaultText)}
            </div>
            <div className="warning-modal-actions" style={{ justifyContent: 'flex-end' }}>
              <button className="btn primary" onClick={closeIntroHelpModal}>Got It</button>
            </div>
          </div>
        </div>
      ) : null}
      {chordPanelHelpModalOpen ? (
        <div className="warning-modal-overlay" role="dialog" aria-modal="true" aria-label="Chord panels help">
          <div className="warning-modal">
            <h3>Chord Panels Quick Guide</h3>
            <div style={{ marginTop: 8, maxHeight: '56vh', overflowY: 'auto', border: '1px solid var(--border)', borderRadius: 8, padding: '10px 12px' }}>
              {renderSimpleMarkdown(chordPanelHelpDefaultText)}
            </div>
            <div className="warning-modal-actions" style={{ justifyContent: 'flex-end' }}>
              <button className="btn primary" onClick={() => setChordPanelHelpModalOpen(false)}>Got It</button>
            </div>
          </div>
        </div>
      ) : null}
      {theoryHelpModalOpen ? (
        <div className="warning-modal-overlay" role="dialog" aria-modal="true" aria-label="Theory panel help">
          <div className="warning-modal">
            <h3>Chord Progression Analysis</h3>
            <div style={{ marginTop: 8, maxHeight: '56vh', overflowY: 'auto', border: '1px solid var(--border)', borderRadius: 8, padding: '10px 12px' }}>
              {renderSimpleMarkdown(theoryHelpText)}
            </div>
            <div className="warning-modal-actions" style={{ justifyContent: 'flex-end' }}>
              <button className="btn primary" onClick={() => setTheoryHelpModalOpen(false)}>Got It</button>
            </div>
          </div>
        </div>
      ) : null}
      {loadSaveHelpModalOpen ? (
        <div className="warning-modal-overlay" role="dialog" aria-modal="true" aria-label="Song Library help">
          <div className="warning-modal">
            <h3>Song Library</h3>
            <div style={{ marginTop: 8, maxHeight: '56vh', overflowY: 'auto', border: '1px solid var(--border)', borderRadius: 8, padding: '10px 12px' }}>
              {renderSimpleMarkdown(loadSaveHelpText)}
            </div>
            <div className="warning-modal-actions" style={{ justifyContent: 'flex-end' }}>
              <button className="btn primary" onClick={() => setLoadSaveHelpModalOpen(false)}>Got It</button>
            </div>
          </div>
        </div>
      ) : null}
      {settingsHelpModalOpen ? (
        <div className="warning-modal-overlay" role="dialog" aria-modal="true" aria-label="Settings help">
          <div className="warning-modal">
            <h3>Settings</h3>
            <div style={{ marginTop: 8, maxHeight: '56vh', overflowY: 'auto', border: '1px solid var(--border)', borderRadius: 8, padding: '10px 12px' }}>
              {renderSimpleMarkdown(settingsHelpText)}
            </div>
            <div className="warning-modal-actions" style={{ justifyContent: 'flex-end' }}>
              <button className="btn primary" onClick={() => setSettingsHelpModalOpen(false)}>Got It</button>
            </div>
          </div>
        </div>
      ) : null}
      <div ref={mainPanelRef} className="panel main-panel main-panel--sticky">
        <div className="app-header">
          <div className="app-title">
            <button className="app-title-btn" type="button" onClick={focusOptionsPanel} title="Back to Instrument View">
              <h1>Jazz Tune Visualiser</h1>
            </button>
            <button className="btn options-panel-info" type="button" onClick={handleTitleHelpClick} title="Show intro/help" style={{fontSize:'16px',fontWeight:'700',lineHeight:1,marginLeft:'6px',width:'28px',height:'28px',padding:0,flexShrink:0}}>?</button>
            <div className="chord-nav-debug">
              <span>C: <strong>{getChordDisplayText(chords[currentIdx])}</strong></span>
              <span className="chord-nav-arrow">→</span>
              <span>D: <strong>{pendingIdx !== null ? getChordDisplayText(chords[pendingIdx]) : '—'}</strong></span>
            </div>
          </div>
          <div className="app-actions">
            <div className="transport-controls">
            <button className="btn" onClick={() => transposeSongKey(-1)}>Key-</button>
            <button className="btn" onClick={() => transposeSongKey(1)}>Key+</button>
            <button

              <button
                className="roadmap-item roadmap-chip-btn"
                onClick={() => setTipsModalGroup({
                  ...IMPROVISATION_APP_GUIDE.chordHearing,
                  lines: [
                    ...IMPROVISATION_APP_GUIDE.chordHearing.lines,
                    `Guide-tone route now: 3rd line ${theoryAdviceThirdMotion} | 7th line ${theoryAdviceSeventhMotion}`,
                    ...(theoryNeedsExtensionGuidance
                      ? ['Extension advice: this source chord has no tensions set. Add a tension/alteration when you want narrower, more specific guidance.']
                      : [])
                  ]
                })}
                title="Open Chord Hearing And Outline Guidance"
              >
                <span className="roadmap-title">Hear And Outline The Changes</span>
                <span className="roadmap-detail">Chord tones, colour tones, arpeggios, and guide-tone focus.</span>
              </button>
              <button
                className="roadmap-item roadmap-chip-btn"
                onClick={() => setTipsModalGroup(IMPROVISATION_APP_GUIDE.noteStrategy)}
                title="Open Target Notes And Scale Logic"
              >
                <span className="roadmap-title">Target Notes And Scale Logic</span>
                <span className="roadmap-detail">Using approach tones, scale fragments, and tactics for recovering from mistakes.</span>
              </button>
              <button
                className="roadmap-item roadmap-chip-btn"
                onClick={() => setTipsModalGroup(IMPROVISATION_APP_GUIDE.phraseDevices)}
                title="Open Phrase Construction Devices"
              >
                <span className="roadmap-title">How to Construct Phrases</span>
                <span className="roadmap-detail">Cells, enclosures, sequencing, direction changes, and using quotes.</span>
              </button>
              <button
                className="roadmap-item roadmap-chip-btn"
                onClick={() => setTipsModalGroup(IMPROVISATION_APP_GUIDE.rhythmFeel)}
                title="Open Rhythm And Timing"
              >
                <span className="roadmap-title">Rhythm And Timing</span>
                <span className="roadmap-detail">Duration variety, syncopation, and phrase momentum.</span>
              </button>
            </div>
          </div>
        )}
      </div></div> : null}

      {activeOptionView === 'chord-builder' ? <div className="option-view-section"><div className="panel settings-panel options-corner-host">
        <div style={{ position: 'absolute', top: 4, right: 4, zIndex: 2, display: 'flex', gap: 2, alignItems: 'center' }}>
          <button className="btn panel-corner-options-btn panel-corner-options-btn--inline" onClick={() => setActiveOptionView('scales-licks')}>Scales/Licks</button>
          <button className="btn panel-corner-options-btn panel-corner-options-btn--inline" onClick={() => setActiveOptionView('theory')}>Theory</button>
          <button className="btn panel-corner-options-btn panel-corner-options-btn--inline" onClick={() => setActiveOptionView('songs')}>Song Library</button>
          <button className="btn panel-corner-options-btn panel-corner-options-btn--inline" onClick={focusOptionsPanel} title="Back to Options (resets viewport/scroll position)" aria-label="Back to Options (resets viewport/scroll position)">Instrument View</button>
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 0 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
            <h2 className="settings-panel-header" style={{ margin: 0 }}>Chord Panels</h2>
            <button className="btn panel-quick-action-btn" onClick={openChordPanelHelpModal} title="Chord Panels help">?</button>
          </div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
            <label className="label" style={{ margin: 0, whiteSpace: 'nowrap' }}>Song Length In Bars:</label>
            <select value={songBarTarget} onChange={e => {
              const newTarget = Number(e.target.value);
              if (newTarget < songLengthBars) {
                setOverflowPrompt({ source: 'tempo-reduce', requestedBarTarget: newTarget, currentBars: songLengthBars });
                return;
              }
              if (newTarget > songLengthBars) {
                setOverflowPrompt({ source: 'tempo-expand', requestedBarTarget: newTarget, currentBars: songLengthBars });
                return;
              }
              setSongBarTarget(newTarget);
            }}><option value={4}>4</option><option value={8}>8</option><option value={12}>12</option><option value={16}>16</option><option value={32}>32</option></select>
            <span className="tiny" style={{ opacity: 0.75 }}>{Number.isInteger(songLengthBars) ? songLengthBars : songLengthBars.toFixed(1)} / {targetSongBars}</span>
          </div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
            <label className="label" style={{ margin: 0, whiteSpace: 'nowrap' }}>Note Labels:</label>
            <select
              value={noteLabelControlValue}
              onChange={e => {
                const v = e.target.value;
                if (v === 'note#') {
                  setLabelMode('note');
                  setUseFlats(false);
                } else if (v === 'noteb') {
                  setLabelMode('note');
                  setUseFlats(true);
                } else {
                  setLabelMode(v);
                }
              }}
            >
              <option value="degree">Degree</option>
              <option value="note#">Note ♯</option>
              <option value="noteb">Note ♭</option>
              <option value="off">Off</option>
            </select>
          </div>
        </div>

        <div className="grid chord-editor-grid">
          {getWindowChords.map(({ chord: ch, originalIdx: i, startBar }) => {
            const displayStripeColor = chordPanelDisplayColors[i] || ch.color;
            const hasHalfBarStart = !Number.isInteger(startBar) && Math.abs((startBar % 1) - 0.5) < 0.001;
            const barBase = hasHalfBarStart ? Math.floor(startBar) : startBar;
            const barLabel = Number.isInteger(barBase) ? String(barBase) : Number(barBase).toFixed(2).replace(/\.00$/, '');
            const chordSummary = `${chordDisplayLabel(ch, useFlats)}${(ch.bass && ch.bass !== ch.root) ? `/${displayNoteName(ch.bass, useFlats)}` : ''}`;
            const savedScaleLabel = ch.selectedScaleName
              ? `${displayNote(Number.isInteger(ch.selectedScaleRootIdx) ? ch.selectedScaleRootIdx : (NOTE_TO_INDEX[ch.root] ?? 0), useFlats)} ${ch.selectedScaleName}`
              : '';
            const dragPosition = dragOverChordDrop?.index === i ? dragOverChordDrop.position : null;
            return (
            <div
              key={i}
              className={`panel chord-card${i===currentIdx ? ' chord-card--current' : ''}${isPlaying && i===currentIdx ? ' chord-card--playing' : ''}${draggedChordIndex === i ? ' chord-card--dragging' : ''}${dragPosition === 'before' ? ' chord-card--drop-before' : ''}${dragPosition === 'after' ? ' chord-card--drop-after' : ''}`}
              style={{ borderLeft: `8px solid ${displayStripeColor}`, opacity: i===currentIdx ? 1 : 0.8 }}
              draggable={!isPlaying}
              title={isPlaying ? 'Reordering is disabled during playback.' : 'Drag this chord card to move it, or drop it on the delete zone to remove it.'}
              onDragStart={e => {
                if (isPlaying) {
                  e.preventDefault();
                  return;
                }
                e.dataTransfer.effectAllowed = 'move';
                e.dataTransfer.setData('text/plain', String(i));
                setDraggedChordIndex(i);
                setDragOverChordDrop(null);
              }}
              onDragOver={e => {
                if (isPlaying || draggedChordIndex === null || draggedChordIndex === i) return;
                e.preventDefault();
                const bounds = e.currentTarget.getBoundingClientRect();
                const position = (e.clientY - bounds.top) < (bounds.height / 2) ? 'before' : 'after';
                setDragOverChordDrop({ index: i, position });
              }}
              onDragLeave={() => {
                if (dragOverChordDrop?.index === i) setDragOverChordDrop(null);
              }}
              onDrop={e => {
                if (isPlaying || draggedChordIndex === null || draggedChordIndex === i) return;
                e.preventDefault();
                const bounds = e.currentTarget.getBoundingClientRect();
                const position = (e.clientY - bounds.top) < (bounds.height / 2) ? 'before' : 'after';
                reorderChordCard(draggedChordIndex, i, position);
              }}
              onDragEnd={() => {
                setDraggedChordIndex(null);
                setDragOverChordDrop(null);
              }}
            >
              <div className="chord-card-header">
                <strong className="chord-card-title">Bar {barLabel}{hasHalfBarStart ? <span className="tiny">½</span> : null} · Chord {i+1} · {chordSummary}{savedScaleLabel ? ` · Saved Scale - ${savedScaleLabel}` : ''}</strong>
                <div className="chord-card-actions">
                <button
                  className="btn chord-card-action-btn"
                  onClick={e => {
                    e.preventDefault();
                    e.stopPropagation();
                    deleteChordCard(i);
                  }}
                  draggable={false}
                  onDragStart={e => e.preventDefault()}
                  title="Deletes this panel"
                >
                  Delete
                </button>
                <button
                  className="btn chord-card-action-btn"
                  onClick={e => {
                    e.preventDefault();
                    e.stopPropagation();
                    insertChordAfter(i);
                  }}
                  draggable={false}
                  onDragStart={e => e.preventDefault()}
                  title="Adds new panel to the right"
                >
                  Add New ➜
                </button>
                </div>
              </div>
              <div className="chord-card-fields">
                <div className="chord-field"><label className="label">Root</label><select value={ch.root} onChange={e => { const a=chords.map((c,j)=>j===i?{...c,root:e.target.value, originalRoot: e.target.value, inversion: 0, bass: e.target.value, subCycleIndex: 0, subBaseRoot: null, subBaseQuality: null, subBaseTensions: null}:c); tryApplyChordChange(i, a); }}>{ROOT_OPTIONS.map(r => <option key={r} value={r}>{displayNoteName(r, useFlats)}</option>)}</select></div>
                <div className="chord-field"><label className="label">Quality</label><select value={ch.quality} onChange={e => { const a=chords.map((c,j)=>{ if(j!==i) return c; const originalRoot = c.originalRoot || c.root; const maxInv = getMaxInversion(originalRoot, e.target.value, []); const nextInv = Math.min(c.inversion || 0, maxInv); const nextBass = getBassNote(originalRoot, e.target.value, [], nextInv); return {...c,quality:e.target.value,tensions:[],inversion: nextInv,root: originalRoot,bass: nextBass,originalRoot,subCycleIndex: 0, subBaseRoot: null, subBaseQuality: null, subBaseTensions: null}; }); tryApplyChordChange(i, a); }}>{QUALITY_OPTIONS.map(q => <option key={q} value={q}>{q}</option>)}</select></div>
                <div className="chord-field"><label className="label">Duration</label><select value={ch.beats} onChange={e => {
                  const requestedBeats = Number(e.target.value);
                  const otherChordsBeats = chords.reduce((sum, c, j) => sum + (j === i ? 0 : (c.beats || 4)), 0);
                  const maxBeatsForChord = Math.max(2, targetSongBeats - otherChordsBeats);
                  const requestedBars = requestedBeats / 4;
                  const maxBars = maxBeatsForChord / 4;
                  const wouldOverflow = requestedBeats > maxBeatsForChord;

                  if (wouldOverflow) {
                    const requiredBars = (otherChordsBeats + requestedBeats) / 4;
                    const nextTargetBars = SUPPORTED_BAR_TARGETS.find(v => v >= requiredBars) || null;
                    setOverflowPrompt({
                      chordIndex: i,
                      requestedBeats,
                      requestedBars,
                      maxBeats: maxBeatsForChord,
                      maxBars,
                      targetBars: targetSongBars,
                      nextTargetBars
                    });
                    return;
                  }

                  const nextBeats = requestedBeats;
                  const a=chords.map((c,j)=>j===i?{...c,beats:nextBeats}:c);
                  setChords(a);
                }}>{durationBeatOptions.map(beats => {
                  const bars = beats / 4;
                  const label = beats === 2
                    ? '1/2 bar'
                    : (Number.isInteger(bars) ? `${bars} bar${bars === 1 ? '' : 's'}` : `${bars} bars`);
                  return <option key={beats} value={beats}>{label}</option>;
                })}</select></div>
                <div className="chord-field"><label className="label">Colour</label><input className="chord-color-input" type="color" value={ch.color} onChange={e => { const a=chords.map((c,j)=>j===i?{...c,color:e.target.value}:c); setChords(a); }} /></div>
              </div>
              <div className="chord-extensions"><label className="label">Extensions / Alterations</label><div className="tension-panel"><div className="tension-grid">{TENSION_OPTIONS.map(t => (<label key={t} className="tiny tension-chip"><input type="checkbox" checked={ch.tensions.includes(t)} onChange={e => { const a=chords.map((c,j)=>{ if(j!==i) return c; const nextTensions = e.target.checked?[...ch.tensions,t]:ch.tensions.filter(x=>x!==t); const originalRoot = c.originalRoot || c.root; const maxInv = getMaxInversion(originalRoot, c.quality, nextTensions); const nextInv = Math.min(c.inversion || 0, maxInv); const nextBass = getBassNote(originalRoot, c.quality, nextTensions, nextInv); return {...c,tensions:nextTensions,inversion:nextInv,root:originalRoot,bass:nextBass,originalRoot,subCycleIndex: 0, subBaseRoot: null, subBaseQuality: null, subBaseTensions: null}; }); tryApplyChordChange(i, a); }} /> <span>{t}</span></label>))}</div></div></div>
            </div>
          );})}
        </div>
      </div></div> : null}

      {activeOptionView === 'settings' ? <div className="option-view-section"><div className="grid settings-grid">
        <div className="panel settings-panel metronome-panel options-corner-host"><button className="btn panel-corner-options-btn" onClick={focusOptionsPanel} title="Back to Options (resets viewport/scroll position)" aria-label="Back to Options (resets viewport/scroll position)">Instrument View</button><h2 className="settings-panel-header" style={{ display: 'inline' }}>Settings</h2><button className="btn options-panel-info" onClick={() => setSettingsHelpModalOpen(true)} title="Settings help" style={{ marginLeft: 6, verticalAlign: 'middle' }}>?</button>
          <div className="grid settings-panel-grid">
            <div className="settings-field"><label className="label">Master Volume</label><input type="range" min="0" max="1" step="0.1" value={volume} onChange={e => setVolume(Number(e.target.value))} /></div>
            <div className="settings-field"><label className="label">Piano Tone</label><select value={pianoMode} onChange={e => setPianoMode(e.target.value)}><option value="warm">Warm</option><option value="warmer">Warmer</option></select><div className="tiny settings-note">Warmer is mellower, with a softer top end and longer tail.</div></div>
            <div className="settings-field"><label className="label">Note Length (% of beat)</label><input className="tick-slider" type="range" min="0.1" max="1" step="0.05" value={noteLenRatio} onChange={e => setNoteLenRatio(Number(e.target.value))} /></div>
            <div className="settings-field"><label className="label">Humanize Amount (%)</label><input className="tick-slider" type="range" min="0" max="100" value={humanizeAmount} onChange={e => setHumanizeAmount(Number(e.target.value))} /><div className="tiny settings-note">±{Math.round(humanizeMs)}ms timing | ±{Math.round(humanizeVel)}% velocity</div></div>
            <div className="settings-field"><label className="label">Comping Placement</label><input className="tick-slider" type="range" min="-100" max="100" value={compingPlacement} onChange={e => setCompingPlacement(normalizeCompingPlacement(e.target.value))} /><div className="tiny settings-note">{Math.round((compingPlacement / 100) * 16)}ms {compingPlacement > 0 ? 'ahead' : (compingPlacement < 0 ? 'behind' : 'centre')}</div></div>
            <div className="settings-field settings-field--wide"><label className="label">Reverb Amount (%)</label><input className="tick-slider" type="range" min="0" max="100" value={reverbAmount} onChange={e => setReverbAmount(Number(e.target.value))} /><div className="tiny settings-note">Hall reverb mix (dry/wet)</div></div>
            <div className="settings-field"><label className="label">Metronome Volume</label><input type="range" min="0" max="1" step="0.1" value={metroVolume} onChange={e => setMetroVolume(Number(e.target.value))} /></div>
            <div className="settings-field"><label className="label">Subdivision</label><select value={metroSubdivision} onChange={e => setMetroSubdivision(e.target.value)}><option value="quarter">Quarter</option><option value="eighth-straight">Eighths (straight)</option><option value="eighth-swing">Eighths (swing)</option><option value="clave-3-2">Clave 3-2</option><option value="clave-2-3">Clave 2-3</option></select></div>
            <div className="settings-field"><label className="label">Accent Every (N beats)</label><input type="number" min="1" max="8" value={accentEvery} onChange={e => setAccentEvery(Number(e.target.value))} /></div>
            <div className="settings-field"><label className="label">Swing Feel (first 8th %)</label><input className="tick-slider" type="range" min="50" max="75" value={swingPercent} onChange={e => setSwingPercent(Number(e.target.value))} /><div className="tiny settings-note">Triplet: 66% | {swingPercent}%</div></div>
          </div>
        </div>
      </div></div> : null}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
